<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guerreiros da Floresta</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--bg:#060d07;--s:#111d12;--s2:#172714;--bd:#243825;--gold:#c9971a;--glt:#e8c040;--gdim:#7a5c0a;--red:#cc3333;--grn:#4aaa30;--text:#e0c890;--dim:#7a6a42}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'IM Fell English',serif;min-height:100vh;overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{text-shadow:0 0 40px rgba(201,151,26,.5)}50%{text-shadow:0 0 90px rgba(201,151,26,1)}}
@keyframes fireGlow{0%,100%{text-shadow:0 0 20px rgba(200,60,30,.6)}50%{text-shadow:0 0 60px rgba(200,60,30,1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes floatUp{0%{transform:translateY(100vh);opacity:0}10%{opacity:.9}90%{opacity:.5}100%{transform:translateY(-30px);opacity:0}}
@keyframes popIn{from{opacity:0;transform:scale(.82)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes congratsBurst{0%{opacity:0;transform:scale(.3) rotate(-5deg)}60%{opacity:1;transform:scale(1.08) rotate(1deg)}100%{transform:scale(1) rotate(0)}}
@keyframes congratsGlow{0%,100%{text-shadow:0 0 60px rgba(232,192,64,.9),0 0 120px rgba(232,192,64,.5)}50%{text-shadow:0 0 100px rgba(255,220,80,1),0 0 200px rgba(255,180,30,.8)}}
@keyframes starPop{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
@keyframes diffBadgePop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}

.map-select{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;position:relative;overflow:hidden;
background:radial-gradient(ellipse at 35% 20%,rgba(38,89,33,.35),transparent 55%),linear-gradient(180deg,#060d07,#0c1a0d 45%,#060d07)}
.t-ember{position:absolute;border-radius:50%;pointer-events:none;animation:floatUp linear infinite}
.t-trees{position:absolute;bottom:0;left:0;right:0;font-size:3rem;line-height:1;opacity:.15;letter-spacing:10px;pointer-events:none}
.ms-title{font-family:'Cinzel Decorative',cursive;font-size:clamp(1.8rem,4.5vw,3.5rem);color:var(--glt);animation:glow 3s infinite,popIn .8s ease both;margin-bottom:.3em}
.ms-eye{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:8px;color:#c84020;text-transform:uppercase;margin-bottom:12px;animation:fadeIn .8s .2s both}
.ms-sub{font-family:'Cinzel',serif;font-size:.74rem;color:var(--dim);letter-spacing:5px;text-transform:uppercase;margin-bottom:1.5rem;animation:fadeIn .8s .4s both}
.ms-div{width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--gdim),transparent);margin:0 auto 1.5rem;animation:fadeIn .8s .5s both}
.map-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;animation:slideUp .8s .6s both;margin-bottom:1.5rem}
.map-card{width:230px;cursor:pointer;border-radius:10px;overflow:hidden;border:2px solid var(--bd);transition:all .3s;background:var(--s)}
.map-card:hover{border-color:var(--gold);transform:translateY(-8px);box-shadow:0 16px 48px rgba(0,0,0,.7),0 0 24px rgba(201,151,26,.22)}
.map-card-thumb{height:140px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:4rem}
.map-card-body{padding:14px}
.map-card-name{font-family:'Cinzel',serif;font-size:.88rem;color:var(--glt);letter-spacing:2px;margin-bottom:5px}
.map-card-desc{font-size:.72rem;color:var(--dim);font-style:italic;line-height:1.6;margin-bottom:8px}
.map-card-badge{position:absolute;top:8px;right:8px;font-family:'Cinzel',serif;font-size:.58rem;color:var(--gold);background:rgba(0,0,0,.7);padding:3px 8px;border-radius:3px;letter-spacing:1px;border:1px solid var(--gdim)}
.map-card-beaten{position:absolute;top:8px;left:8px;font-size:.6rem;color:#4aff80;background:rgba(0,40,0,.75);padding:2px 7px;border-radius:3px;letter-spacing:1px}
.diff-badge{display:inline-block;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:2px;padding:3px 10px;border-radius:3px;text-transform:uppercase;animation:diffBadgePop .4s ease both}
.diff-easy{background:rgba(40,140,40,.3);color:#4aff80;border:1px solid #4aaa30}
.diff-medium{background:rgba(200,120,20,.3);color:#e8a030;border:1px solid #c07020}
.diff-hard{background:rgba(180,30,30,.3);color:#ff5050;border:1px solid #aa2020}

.game-wrap{flex:1;display:flex;flex-direction:column;background:#000;overflow:hidden;height:100vh}
.hud-bar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:7px 14px;background:linear-gradient(90deg,var(--s),var(--s2));border-bottom:2px solid var(--bd);flex-shrink:0;gap:8px}
.hud-base{display:flex;align-items:center;gap:7px}
.hud-base.right{flex-direction:row-reverse}
.base-icon{font-size:1.3rem}
.base-hp-wrap{flex:1}
.base-hp-track{height:9px;background:rgba(0,0,0,.5);border-radius:5px;overflow:hidden;border:1px solid var(--bd);min-width:80px}
.base-hp-fill{height:100%;border-radius:5px;transition:width .3s}
.p-fill{background:linear-gradient(90deg,#2a8a20,#40aa30)}
.e-fill{background:linear-gradient(90deg,#8b1f1f,#cc3333)}
.base-hp-val{font-family:'Cinzel',serif;font-size:.7rem;min-width:28px;display:block;text-align:center;color:var(--text)}
.hud-center{text-align:center;display:flex;flex-direction:column;gap:2px}
.wave-lbl{font-family:'Cinzel',serif;font-size:.68rem;color:var(--gold);letter-spacing:2px;text-transform:uppercase}
.wave-timer{font-size:.72rem;color:var(--dim);transition:color .3s}
.wave-timer.urgent{color:var(--red);animation:pulse 1s infinite}
.gold-disp{font-family:'Cinzel',serif;font-size:.8rem;color:var(--glt);letter-spacing:1px}
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#000;position:relative;min-height:0}
#gc{display:block;max-width:100%;max-height:100%;object-fit:contain}
.unit-panel{display:flex;gap:7px;padding:8px 10px;background:linear-gradient(0deg,var(--s2),var(--s));border-top:2px solid var(--bd);flex-shrink:0;flex-wrap:wrap;justify-content:center;overflow-x:auto}
.ubtn{display:flex;flex-direction:column;align-items:center;padding:7px 11px;background:linear-gradient(145deg,var(--s2),var(--s));border:2px solid var(--bd);border-radius:6px;cursor:pointer;transition:all .2s;min-width:68px;position:relative;overflow:hidden}
.ubtn:hover:not(.disabled){border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.5),0 0 12px rgba(201,151,26,.15)}
.ubtn.selected{border-color:var(--gold);background:linear-gradient(145deg,rgba(201,151,26,.2),rgba(201,151,26,.08));box-shadow:0 0 16px rgba(201,151,26,.3)}
.ubtn.disabled{opacity:.35;cursor:not-allowed}
.ubtn-emoji{font-size:1.5rem;margin-bottom:2px;line-height:1}
.ubtn-name{font-family:'Cinzel',serif;font-size:.58rem;color:var(--gold);letter-spacing:.5px;white-space:nowrap;margin-bottom:1px}
.ubtn-cost{font-size:.62rem;color:var(--dim)}
.ubtn-hp{font-size:.56rem;color:rgba(74,170,64,.7)}
.ubtn.selected .ubtn-name{color:var(--glt)}

.end-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px 20px;position:relative;overflow:hidden}
.vic-title{font-family:'Cinzel Decorative',cursive;font-size:clamp(1.8rem,4.5vw,3.2rem);color:var(--glt);animation:glow 2s infinite;margin-bottom:12px}
.def-title{font-family:'Cinzel Decorative',cursive;font-size:clamp(1.8rem,4.5vw,3.2rem);color:var(--red);animation:fireGlow 2s infinite;margin-bottom:12px}
.congrats-title{font-family:'Cinzel Decorative',cursive;font-size:clamp(2.2rem,5.5vw,4.2rem);color:var(--glt);animation:congratsBurst .8s cubic-bezier(.2,1.4,.4,1) both,congratsGlow 2s infinite .8s;margin-bottom:.2em;line-height:1.1}
.congrats-sub{font-family:'Cinzel',serif;font-size:clamp(.9rem,2.5vw,1.4rem);color:#e8a030;letter-spacing:3px;animation:fadeIn 1s .5s both;margin-bottom:10px}
.end-sub{font-size:.95rem;max-width:520px;line-height:1.9;font-style:italic;margin-bottom:24px;animation:fadeIn 1s .4s both}
.end-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:480px;margin-bottom:22px;animation:fadeIn 1s .6s both}
.estat{background:var(--s);border:1px solid var(--bd);padding:10px;text-align:center;border-radius:4px}
.estat .ei{font-size:1.4rem}.estat .el{font-size:.6rem;color:var(--dim);margin:2px 0;text-transform:uppercase;letter-spacing:1px}.estat .ev{font-family:'Cinzel',serif;font-size:1.2rem}
.btn-primary{font-family:'Cinzel',serif;letter-spacing:2px;cursor:pointer;background:linear-gradient(135deg,#3a7a30,#2a5a22);color:var(--glt);border:2px solid var(--gold);padding:12px 38px;font-size:.9rem;transition:all .25s}
.btn-primary:hover{background:linear-gradient(135deg,#4a9a40,#3a7a30);box-shadow:0 0 30px rgba(201,151,26,.3);transform:translateY(-2px)}
.flex-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.stars-row{font-size:2.5rem;animation:starPop .5s cubic-bezier(.2,1.4,.4,1) both;margin-bottom:12px;letter-spacing:8px}

@media(max-width:600px){.unit-panel{gap:4px;padding:5px 6px}.ubtn{min-width:56px;padding:5px 7px}.ubtn-emoji{font-size:1.2rem}.hud-bar{padding:5px 8px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const CW=960,CH=420,GY=360;
const P_BASE_X=54,E_BASE_X=CW-54;
const P_SPAWN_MAX=Math.floor(CW*.38);
const E_SPAWN_X=E_BASE_X-80;
const MAX_HP=1000;
const MAX_PARTS=320;
const P_BASE_WALL=P_BASE_X+50;
const E_BASE_WALL=E_BASE_X-50;

// ── UNIT DEFS ──────────────────────────────────────
const UDEFS={
  warrior:{nm:'Guerreiro',em:'⚔️',cost:50, hp:190,dmg:32,spd:64,rng:46,rate:1.05,sz:22,type:'melee', prio:'melee', desc:'Combatente equilibrado'},
  archer: {nm:'Arqueiro', em:'🏹',cost:75, hp:82, dmg:44,spd:54,rng:225,rate:1.45,sz:19,type:'ranged',prio:'ranged',desc:'Prioriza atiradores inimigos'},
  spear:  {nm:'Lanceiro', em:'🗡️',cost:65, hp:150,dmg:36,spd:56,rng:68,rate:.95,sz:21,type:'melee', prio:'melee', desc:'Trava múltiplos inimigos'},
  shaman: {nm:'Xamã',     em:'✨',cost:110,hp:115,dmg:20,spd:46,rng:185,rate:1.9,sz:20,type:'support',prio:'any',   desc:'Cura aliados, ataca com orbes'},
  chief:  {nm:'Cacique',  em:'🪶',cost:160,hp:360,dmg:65,spd:42,rng:54,rate:1.9,sz:26,type:'melee', prio:'any',   desc:'Herói — alto HP e dano'},
};

// ── ENEMY DEFS (per-map difficulty is applied via scale multiplier) ──
const EDEFS={
  soldier:    {nm:'Soldado',    hp:120,dmg:24,spd:55,rng:44,rate:1.3, sz:21,type:'melee', prio:'melee', eType:'soldier'},
  arquebusier:{nm:'Arcabuzeiro',hp:78, dmg:46,spd:48,rng:205,rate:1.9,sz:18,type:'ranged',prio:'ranged',eType:'arquebusier'},
  captain:    {nm:'Capitão',    hp:310,dmg:52,spd:46,rng:50, rate:1.8,sz:25,type:'melee', prio:'any',   eType:'captain'},
  musketeer:  {nm:'Mosqueteiro',hp:92, dmg:62,spd:40,rng:250,rate:2.5,sz:18,type:'ranged',prio:'ranged',eType:'musketeer'},
  crossbow:   {nm:'Besteiro',   hp:88, dmg:52,spd:44,rng:215,rate:2.1,sz:19,type:'ranged',prio:'ranged',eType:'crossbow'},
  elite:      {nm:'Elite',      hp:420,dmg:70,spd:40,rng:52, rate:1.6,sz:27,type:'melee', prio:'any',   eType:'captain'},
};

// ── PER-MAP CONFIG ─────────────────────────────────
const MAP_CFG={
  forest:{
    diff:1.0,        // enemy stat multiplier
    waveBonus:25,    // gold per wave
    waveInterval:20, // seconds between waves
    waves:[
      [{t:'soldier',n:3}],
      [{t:'soldier',n:4},{t:'arquebusier',n:1}],
      [{t:'soldier',n:5},{t:'crossbow',n:2}],
      [{t:'soldier',n:4},{t:'captain',n:1},{t:'arquebusier',n:2}],
      [{t:'captain',n:2},{t:'crossbow',n:2},{t:'arquebusier',n:2}],
    ]
  },
  ship:{
    diff:1.45,
    waveBonus:30,
    waveInterval:18,
    waves:[
      [{t:'soldier',n:4},{t:'crossbow',n:2}],
      [{t:'soldier',n:4},{t:'arquebusier',n:2},{t:'crossbow',n:2}],
      [{t:'captain',n:2},{t:'crossbow',n:3}],
      [{t:'soldier',n:4},{t:'captain',n:2},{t:'musketeer',n:2}],
      [{t:'captain',n:2},{t:'musketeer',n:3},{t:'crossbow',n:3}],
      [{t:'soldier',n:5},{t:'captain',n:2},{t:'musketeer',n:3},{t:'crossbow',n:2}],
    ]
  },
  village:{
    diff:2.1,
    waveBonus:40,
    waveInterval:16,
    waves:[
      [{t:'soldier',n:5},{t:'crossbow',n:3}],
      [{t:'captain',n:2},{t:'musketeer',n:3},{t:'crossbow',n:2}],
      [{t:'soldier',n:6},{t:'captain',n:2},{t:'musketeer',n:3}],
      [{t:'elite',n:1},{t:'musketeer',n:3},{t:'crossbow',n:4}],
      [{t:'captain',n:3},{t:'elite',n:1},{t:'musketeer',n:4}],
      [{t:'soldier',n:6},{t:'captain',n:3},{t:'elite',n:2},{t:'musketeer',n:3},{t:'crossbow',n:3}],
      [{t:'captain',n:4},{t:'elite',n:3},{t:'musketeer',n:5},{t:'crossbow',n:4}],
    ]
  }
};

const MAPS={
  forest:{nm:'Floresta Sagrada', icon:'🌳',badge:'MAPA 1',diff:'Iniciante', diffCls:'diff-easy',
    desc:'Combata nas sombras da floresta ancestral. Inimigos inexperientes.'},
  ship:  {nm:'Navio em Alto Mar',icon:'⛵',badge:'MAPA 2',diff:'Moderado',  diffCls:'diff-medium',
    desc:'Batalha no convés de um navio português. Tropas mais fortes.'},
  village:{nm:'Aldeia em Chamas',icon:'🏚️',badge:'MAPA 3',diff:'Brutal',   diffCls:'diff-hard',
    desc:'Defendam a aldeia com a vida. Exército de elite com 7 ondas.'},
};

let G={},ctx,canvas,raf,mouseX=-9,mouseY=-9,lastTs=0;
let mapsBeaten=new Set();

function initState(map){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  const cfg=MAP_CFG[map];
  G={map,screen:'game',pHP:MAX_HP,eHP:MAX_HP,gold:160,goldT:0,
    wave:0,waveTimer:12,spawning:false,spawnQ:[],
    units:[],proj:[],parts:[],floats:[],
    uid:0,pid:0,sel:'warrior',time:0,kills:0,
    pFlash:0,eFlash:0,running:true,
    cfg};
}

// ── SAFE DRAW HELPERS ──────────────────────────────
function cap(x,y,w,h,r){
  const aw=Math.abs(w),ah=Math.abs(h);
  const ar=Math.min(Math.abs(r!==undefined?r:aw/2),aw/2,ah/2);
  ctx.beginPath();ctx.roundRect(x-aw/2,y,aw,ah,Math.max(0,ar));ctx.fill();
}
function limb(ox,oy,w,h,angle,col){
  ctx.save();ctx.translate(ox,oy);ctx.rotate(angle);ctx.fillStyle=col;cap(0,0,w,h);ctx.restore();
}
function safeRR(x,y,w,h,r){
  const aw=Math.abs(w),ah=Math.abs(h);
  ctx.roundRect(x,y,aw,ah,Math.max(0,Math.min(Math.abs(r),aw/2,ah/2)));
}
function feather(cx,cy,len,angle,col){
  const l=Math.abs(len);
  ctx.save();ctx.translate(cx,cy);ctx.rotate(angle);ctx.fillStyle=col;
  ctx.beginPath();ctx.ellipse(0,-l*.5,l*.18,l*.5,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=.8;
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-l);ctx.stroke();
  ctx.restore();
}

// ════════════════════════════════════════════════════
// INDIGENOUS CHARACTERS
// ════════════════════════════════════════════════════
const SKIN_IND='#b07030',CLOTH_IND='#4a2010',P1='#cc2010',P2='#2060c0',P3='#e8c030';
const FC=['#e03010','#e8b010','#20a030','#e86010','#2050c0','#c020a0','#30c050'];

function drawIndigenous(u){
  const x=u.x,s=u.sz/22,ph=u.bobPhase||0;
  const wlk=u.state==='walk',atk=u.atkFlash>0,dead=u.state==='dead';
  const LL=17*s,BH=14*s,HR=7*s,BW=10*s,LW=4.5*s,AW=3.5*s;
  const hipY=GY-LL,shY=hipY-BH,hY=shY-HR*1.3;
  const ls=wlk?Math.sin(ph*2)*.45:0,as=wlk?-ls*.65:0,aa=atk?-1.1:.15;
  ctx.save();
  if(dead){const fa=(1.1-u.deadTimer)*Math.PI*.55;ctx.translate(x,GY);ctx.rotate(fa);ctx.translate(-x,-GY);ctx.globalAlpha=Math.max(0,u.deadTimer*.85);}
  ctx.beginPath();ctx.ellipse(x,GY,u.sz*.9,u.sz*.22,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.28)';ctx.fill();
  limb(x-LW*.5,hipY,-LW,LL*.52,ls*-.8,SKIN_IND);
  limb(x-LW*.5+Math.sin(-ls*.8)*LL*.52,hipY+Math.cos(-ls*.8)*LL*.52,-LW*.85,LL*.5,ls*.4,SKIN_IND);
  ctx.fillStyle=SKIN_IND;ctx.beginPath();safeRR(x-BW*.45,shY,BW*.9,BH*.6,3*s);ctx.fill();
  ctx.fillStyle=P1;ctx.fillRect(x-BW*.35,shY+2*s,BW*.28,BH*.35);ctx.fillRect(x+BW*.08,shY+2*s,BW*.28,BH*.35);
  ctx.fillStyle=P2;ctx.fillRect(x-BW*.35,shY+BH*.22,BW*.28,BH*.15);ctx.fillRect(x+BW*.08,shY+BH*.22,BW*.28,BH*.15);
  ctx.fillStyle=CLOTH_IND;ctx.beginPath();safeRR(x-BW*.6,hipY-BH*.4,BW*1.2,BH*.45,2*s);ctx.fill();
  ctx.fillStyle=P3;ctx.beginPath();safeRR(x-BW*.55,hipY-BH*.42,BW*1.1,3*s,1.5*s);ctx.fill();
  const bA=as*(atk?.3:1);
  limb(x-BW*.35,shY+BH*.12,-AW,BH*.55,bA+.15,SKIN_IND);
  limb(x-BW*.35+Math.sin(bA+.15)*BH*.55,shY+BH*.12+Math.cos(bA+.15)*BH*.55,-AW*.8,BH*.45,bA*.6-.1,SKIN_IND);
  limb(x+LW*.5,hipY,-LW,LL*.52,ls*.8,SKIN_IND);
  limb(x+LW*.5+Math.sin(ls*.8)*LL*.52,hipY+Math.cos(ls*.8)*LL*.52,-LW*.85,LL*.5,-ls*.4,SKIN_IND);
  ctx.beginPath();ctx.arc(x,hY,HR,0,Math.PI*2);ctx.fillStyle=SKIN_IND;ctx.fill();
  ctx.fillStyle=P1;ctx.fillRect(x+HR*.2,hY-HR*.3,HR*.7,HR*.22);ctx.fillRect(x+HR*.2,hY+HR*.05,HR*.7,HR*.22);
  ctx.fillStyle=P3;ctx.fillRect(x+HR*.2,hY-HR*.1,HR*.7,HR*.12);
  ctx.beginPath();ctx.arc(x+HR*.42,hY-HR*.15,HR*.22,0,Math.PI*2);ctx.fillStyle='#1a0a00';ctx.fill();
  ctx.beginPath();ctx.arc(x+HR*.5,hY-HR*.2,HR*.1,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.fillStyle='#7a4015';ctx.beginPath();ctx.arc(x+HR*.7,hY+HR*.15,HR*.1,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=P1;ctx.lineWidth=1.8*s;ctx.beginPath();ctx.arc(x,hY,HR+s,Math.PI*.7,Math.PI*.3,false);ctx.stroke();
  ctx.strokeStyle=P3;ctx.lineWidth=.8*s;ctx.beginPath();ctx.arc(x,hY,HR+s,Math.PI*.7,Math.PI*.3,false);ctx.stroke();
  const nF=u.unitType==='chief'?9:u.unitType==='shaman'?6:5;
  const fL=HR*(u.unitType==='chief'?2.8:u.unitType==='shaman'?2.2:1.9)*s;
  for(let f=0;f<nF;f++){const r=f/(nF-1),ba=Math.PI*(.15+r*.7),wb=Math.sin(ph*.9+f*.7)*.04;feather(x+Math.cos(Math.PI-ba)*HR*.6,hY+Math.sin(Math.PI-ba)*HR*.6,fL,-Math.PI/2-Math.PI*(.35-r*.7)+wb-Math.PI/2,FC[f%FC.length]);}
  const fA=as*(atk?0:1)+(atk?aa:.15);
  const hX=x+BW*.35+Math.sin(fA)*BH*.55+Math.sin(fA*.6-.1)*BH*.45;

function drawPortuguese(u){
  const x=u.x,s=u.sz/21,ph=u.bobPhase||0;

  const SK='#d4a86a';
  const LL=16*s,BH=13*s,HR=6.5*s,BW=10*s,LW=4*s,AW=3.5*s;

  if(dead){const fa=(1.1-u.deadTimer)*Math.PI*.55*-1;ctx.translate(x,GY);ctx.rotate(fa);ctx.translate(-x,-GY);ctx.globalAlpha=Math.max(0,u.deadTimer*.85);}

  limb(x+LW*.5+Math.sin(ls*.8)*LL*.52,hipY+Math.cos(ls*.8)*LL*.52,-LW*.85,LL*.5,-ls*.35,PT);
  ctx.fillStyle='#1a1a1a';ctx.beginPath();safeRR(x+LW*.1,GY-LL*.12,LW*.7,LL*.12+2*s,1.5*s);ctx.fill();
  ctx.fillStyle=AR;ctx.beginPath();safeRR(x-BW*.48,shY,BW*.96,BH*.65,3*s);ctx.fill();
  ctx.fillStyle=AR2;ctx.beginPath();safeRR(x-BW*.28,shY+2*s,BW*.56,BH*.35,2*s);ctx.fill();

    ctx.fillStyle='#7a4a28';
    ctx.beginPath();safeRR(x-BW*.55,shY-2*s,BW*1.1,7*s,3*s);ctx.fill();

  }

  ctx.beginPath();ctx.moveTo(x-BW*.28,shY+BH*.22);ctx.lineTo(x+BW*.28,shY+BH*.22);ctx.stroke();
  ctx.fillStyle='#3a2010';ctx.beginPath();safeRR(x-BW*.5,hipY-BH*.28,BW,3*s,1.5*s);ctx.fill();
  if(eT==='captain'||eT==='elite'){ctx.fillStyle=eT==='elite'?'#5a0808':'#8a1010';ctx.beginPath();ctx.moveTo(x-BW*.6,hipY-BH*.2);ctx.lineTo(x-BW*.6,hipY+LL*.3);ctx.lineTo(x-BW*.1,hipY+LL*.15);ctx.lineTo(x+BW*.1,hipY+LL*.15);ctx.lineTo(x+BW*.6,hipY+LL*.3);ctx.lineTo(x+BW*.6,hipY-BH*.2);ctx.closePath();ctx.fill();}
  ctx.fillStyle=PT;ctx.beginPath();safeRR(x-BW*.42,hipY-2*s,BW*.84,4*s,2*s);ctx.fill();
  const bA=as+(atk?.2:0);
  limb(x-BW*.35,shY+BH*.1,-AW,BH*.52,bA+.12,AR);
  limb(x-BW*.35+Math.sin(bA+.12)*BH*.52,shY+BH*.1+Math.cos(bA+.12)*BH*.52,-AW*.8,BH*.42,bA*.5-.08,SK);
  limb(x-LW*.5,hipY,-LW,LL*.52,-ls*.8,PT);
  limb(x-LW*.5+Math.sin(-ls*.8)*LL*.52,hipY+Math.cos(-ls*.8)*LL*.52,-LW*.85,LL*.5,ls*.35,PT);
  ctx.fillStyle='#1a1a1a';ctx.beginPath();safeRR(x-LW*.8,GY-LL*.12,LW*.7,LL*.12+2*s,1.5*s);ctx.fill();
  ctx.beginPath();ctx.arc(x,hY,HR,0,Math.PI*2);ctx.fillStyle=SK;ctx.fill();
  if(eT==='captain'||eT==='elite'){ctx.fillStyle='rgba(80,50,30,.35)';ctx.beginPath();ctx.ellipse(x,hY+HR*.35,HR*.55,HR*.4,0,0,Math.PI*2);ctx.fill();}
  ctx.beginPath();ctx.arc(x-HR*.38,hY-HR*.12,HR*.2,0,Math.PI*2);ctx.fillStyle='#1a0a00';ctx.fill();
  ctx.beginPath();ctx.arc(x-HR*.3,hY-HR*.18,HR*.08,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  const hC=eT==='elite'?'#3a2820':eT==='captain'?'#5a4030':eT==='musketeer'?'#3a3a4a':'#7a7a8a';
  const hC2=eT==='elite'?'#5a3830':eT==='captain'?'#7a5a40':eT==='musketeer'?'#5a5a6a':'#9a9aaa';
  ctx.fillStyle=hC;ctx.beginPath();ctx.arc(x,hY,HR+1.5*s,Math.PI,0,false);ctx.closePath();ctx.fill();
  ctx.fillStyle=hC2;ctx.beginPath();ctx.ellipse(x,hY+.5*s,HR*1.35,Math.max(.1,3*s),0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=hC;ctx.beginPath();safeRR(x-1.2*s,hY,2.4*s,6*s,1.2*s);ctx.fill();
  if(eT==='captain'){ctx.fillStyle='#cc1010';for(let p=0;p<5;p++){const pa=Math.PI*.5+p*.12-.3;ctx.beginPath();ctx.ellipse(x+Math.cos(pa)*2*s,hY-HR-p*2*s,2*s,6*s,pa,0,Math.PI*2);ctx.fill();}}
  if(eT==='elite'){ctx.fillStyle='#cc8810';for(let p=0;p<7;p++){const pa=Math.PI*.5+p*.1-.3;ctx.beginPath();ctx.ellipse(x+Math.cos(pa)*2*s,hY-HR-p*2.2*s,2.5*s,7*s,pa,0,Math.PI*2);ctx.fill();}}
  ctx.fillStyle='rgba(255,255,255,.18)';ctx.beginPath();ctx.ellipse(x-HR*.3,hY-HR*.5,HR*.35,HR*.22,-.5,0,Math.PI*2);ctx.fill();
  const fA=as+(atk?aa:.12);
  const fTX=x+BW*.35,fTY=shY+BH*.1;
  const eX=fTX+Math.sin(fA)*BH*.52,eY=fTY+Math.cos(fA)*BH*.52;
  const wX=eX+Math.sin(fA*.5-.08)*BH*.42,wY=eY+Math.cos(fA*.5-.08)*BH*.42;
  drawPortWeapon(wX,wY,eT,s,fA,atk);
  limb(fTX,fTY,-AW,BH*.52,fA,AR);limb(eX,eY,-AW*.8,BH*.42,fA*.5-.08,SK);
  ctx.restore();
}
function drawPortWeapon(wx,wy,eT,s,ang,atk){
  ctx.save();ctx.translate(wx,wy);
  switch(eT){
    case'soldier':case'captain':case'elite':
      ctx.rotate(ang+(atk?-.6:.1));
      ctx.fillStyle=eT==='elite'?'#c0c0a0':'#8a8a9a';ctx.beginPath();safeRR(-1.5*s,-18*s,3*s,18*s,1.5*s);ctx.fill();
      ctx.fillStyle=eT==='elite'?'#e0e0c0':'#c0c0d0';ctx.beginPath();safeRR(-1*s,-18*s,2*s,10*s,.8*s);ctx.fill();
      ctx.fillStyle='#8a6020';ctx.beginPath();safeRR(-4*s,-3*s,8*s,3*s,1.5*s);ctx.fill();
      if(eT==='elite'){ctx.fillStyle='#ffd070';ctx.beginPath();ctx.moveTo(0,-20*s);ctx.lineTo(-3*s,-14*s);ctx.lineTo(3*s,-14*s);ctx.closePath();ctx.fill();}
      break;
    case'crossbow':
      ctx.rotate(ang+.3);
      ctx.fillStyle='#4a2a08';ctx.beginPath();safeRR(-2*s,-14*s,4*s,14*s,2*s);ctx.fill();
      ctx.fillStyle='#6a6a7a';ctx.beginPath();safeRR(-9*s,-12*s,18*s,3*s,1.5*s);ctx.fill();
      ctx.strokeStyle='#d4aa60';ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(-9*s,-10.5*s);ctx.lineTo(9*s,-10.5*s);ctx.stroke();
      if(atk){const g=ctx.createRadialGradient(9*s,-10*s,0,9*s,-10*s,5*s);g.addColorStop(0,'rgba(255,220,100,.9)');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(9*s,-10*s,5*s,0,Math.PI*2);ctx.fill();}
      break;
    case'arquebusier':case'musketeer':
      ctx.rotate(ang+.25);
      ctx.fillStyle='#4a2a08';ctx.beginPath();safeRR(-2*s,-26*s,4*s,26*s,2*s);ctx.fill();
      ctx.fillStyle='#8a8a9a';ctx.beginPath();safeRR(-1.8*s,-26*s,3.6*s,16*s,1.8*s);ctx.fill();
      ctx.fillStyle='#6a6a7a';ctx.beginPath();safeRR(-1.5*s,-26*s,3*s,5*s,1.5*s);ctx.fill();
      if(atk){const g=ctx.createRadialGradient(0,-27*s,0,0,-27*s,8*s);g.addColorStop(0,'rgba(255,220,50,.95)');g.addColorStop(.5,'rgba(255,100,10,.5)');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,-27*s,8*s,0,Math.PI*2);ctx.fill();}
      break;
  }
  ctx.restore();
}

// ── DRAW UNIT ──────────────────────────────────────
function drawUnit(u){
  if(u.state==='dead'&&u.deadTimer<=0) return;
  ctx.save();
  if(u.side==='enemy'){ctx.translate(u.x*2,0);ctx.scale(-1,1);}
  if(u.side==='player') drawIndigenous(u);
  else drawPortuguese(u);
  ctx.restore();
  if(u.atkFlash>0){ctx.beginPath();ctx.arc(u.x,GY-u.sz,u.sz+5,0,Math.PI*2);ctx.fillStyle=`rgba(255,220,50,${u.atkFlash*.3})`;ctx.fill();}
  if(u.hp<u.maxHp){
    const bw=u.sz*2.8,bh=5,bx=u.x-bw/2,by=GY-u.sz*2-14;
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(bx,by,bw,bh);
    const p=Math.max(0,u.hp/u.maxHp);
    ctx.fillStyle=p>.6?'#4aaa30':p>.3?'#e8a030':'#cc3333';ctx.fillRect(bx,by,bw*p,bh);
    ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=.8;ctx.strokeRect(bx,by,bw,bh);
  }
}

// ── PROJECTILES ────────────────────────────────────
function drawProjectile(p){
  if(p.dead) return;
  ctx.save();const dx=p.tx-p.x,dy=p.ty-p.y;
  ctx.translate(p.x,p.y);ctx.rotate(Math.atan2(dy,dx));
  if(p.pType==='arrow'){
    ctx.fillStyle='#c8a040';ctx.fillRect(-10,-1.5,20,3);
    ctx.fillStyle='#8a6020';ctx.beginPath();ctx.moveTo(10,0);ctx.lineTo(4,-4);ctx.lineTo(4,4);ctx.closePath();ctx.fill();
  } else if(p.pType==='bolt'){
    ctx.fillStyle='#909090';ctx.fillRect(-8,-2,16,4);
    ctx.fillStyle='#c0c0d0';ctx.beginPath();ctx.moveTo(8,0);ctx.lineTo(3,-4);ctx.lineTo(3,4);ctx.closePath();ctx.fill();
  } else if(p.pType==='orb'){
    const g=ctx.createRadialGradient(0,0,0,0,0,8);
    g.addColorStop(0,'rgba(120,255,160,1)');g.addColorStop(1,'rgba(40,180,80,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fillStyle='rgba(200,255,220,.9)';ctx.fill();
  } else {
    ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fillStyle='rgba(255,200,80,.9)';ctx.fill();
    const g=ctx.createRadialGradient(0,0,0,0,0,7);g.addColorStop(0,'rgba(255,160,30,.5)');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,7,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

// ── PARTICLES / FLOATS ─────────────────────────────
function addParts(x,y,col,n,type='hit'){
  for(let i=0;i<n;i++){
    if(G.parts.length>=MAX_PARTS) break;
    const a=Math.random()*Math.PI*2,sp=type==='death'?90+Math.random()*160:40+Math.random()*100;
    G.parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-(type==='death'?80:20),
      life:type==='death'?.9+Math.random()*.5:.3+Math.random()*.3,
      mxL:type==='death'?1.4:.6,sz:type==='death'?4+Math.random()*4:2.5+Math.random()*2.5,col});
  }
}
function addFloat(x,y,txt,col='#e8c040',sz=14){G.floats.push({x,y,txt,col,sz,life:1.4});}

// ════════════════════════════════════════════════════
// SCENARIO 1: DEEP FOREST — atmospheric layered jungle
// ════════════════════════════════════════════════════
function drawForestBG(){
  const t=G.time;
  // Sky gradient — deep jungle canopy
  const sk=ctx.createLinearGradient(0,0,0,CH);
  sk.addColorStop(0,'#060f06');sk.addColorStop(.3,'#0d1e0a');sk.addColorStop(.7,'#163212');sk.addColorStop(1,'#1e4818');
  ctx.fillStyle=sk;ctx.fillRect(0,0,CW,CH);

  // Moon/sun peeking through canopy
  ctx.save();ctx.globalAlpha=.22;
  const moonG=ctx.createRadialGradient(760,50,0,760,50,70);
  moonG.addColorStop(0,'rgba(230,220,160,1)');moonG.addColorStop(.4,'rgba(180,170,100,.4)');moonG.addColorStop(1,'transparent');
  ctx.fillStyle=moonG;ctx.beginPath();ctx.arc(760,50,70,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // Distant misty layer
  for(let i=0;i<5;i++){
    const mx=((i*220+t*8)%CW+CW)%CW-100;
    ctx.save();ctx.globalAlpha=.07+i*.02;
    ctx.fillStyle='#a0c8a0';
    ctx.beginPath();ctx.ellipse(mx,GY-90,140+i*30,35,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Background tree silhouettes — far layer
  for(let i=0;i<36;i++){
    const tx=(i*27+3)%CW,th=60+Math.sin(i*1.7+.5)*25;
    drawFancyTree(tx,GY-28,th,'.08','#061206','#08180a');
  }

  // Mid layer — bigger trees with canopy detail
  for(let i=0;i<18;i++){
    const tx=(i*55+20)%CW,th=110+Math.sin(i*2.3)*35;
    drawFancyTree(tx,GY,th,'0.55','#0c2a0a','#0a2008');
  }

  // Animated vines hanging from top
  ctx.strokeStyle='rgba(30,80,20,.35)';ctx.lineWidth=1.5;
  for(let v=0;v<12;v++){
    const vx=(v*82+15)%CW;const vl=40+Math.sin(v*1.4)*22;
    ctx.beginPath();
    for(let vy=0;vy<vl;vy+=6){const wx=Math.sin((vy*.18)+t*.6+v)*.9*s;ctx.lineTo(vx+wx,vy);}
    ctx.stroke();
  }

  // Ground — rich forest floor
  const gr=ctx.createLinearGradient(0,GY,0,CH);
  gr.addColorStop(0,'#1e4810');gr.addColorStop(.35,'#163a0c');gr.addColorStop(1,'#0a2006');
  ctx.fillStyle=gr;ctx.fillRect(0,GY,CW,CH-GY);

  // Ground detail — roots, moss patches
  ctx.fillStyle='rgba(12,40,8,.8)';
  for(let r=0;r<22;r++){
    const rx=(r*43+8)%CW;
    ctx.beginPath();ctx.ellipse(rx,GY+4,6+Math.sin(r)*4,3,0,0,Math.PI*2);ctx.fill();
  }
  // Moss patches
  ctx.fillStyle='rgba(40,120,20,.25)';
  for(let m=0;m<16;m++){
    const mx=(m*62+22)%CW;
    ctx.beginPath();ctx.ellipse(mx,GY+3,14+Math.sin(m*1.3)*6,4,0,0,Math.PI*2);ctx.fill();
  }

  // Fireflies — animated
  for(let f=0;f<18;f++){
    const fx=((f*83+Math.sin(t*.45+f)*55)%CW+CW)%CW;
    const fy=GY-35-((f*31+Math.sin(t*.6+f*.7)*40)%110);
    const br=Math.sin(t*2.2+f*1.3)*.5+.5;
    if(br>.3){ctx.beginPath();ctx.arc(fx,fy,1.8,0,Math.PI*2);ctx.fillStyle=`rgba(200,255,100,${br*.5})`;ctx.fill();}
  }

  // Foreground silhouette leaves/branches at bottom edges
  ctx.fillStyle='rgba(4,14,4,.9)';
  ctx.beginPath();ctx.moveTo(0,GY+10);
  for(let lx=0;lx<=90;lx+=8){ctx.lineTo(lx,GY+10-Math.max(0,18-lx*.5)+Math.sin(lx*.3)*4);}
  ctx.lineTo(0,CH);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(CW,GY+10);
  for(let lx=0;lx<=90;lx+=8){ctx.lineTo(CW-lx,GY+10-Math.max(0,18-lx*.5)+Math.sin(lx*.3+1)*4);}
  ctx.lineTo(CW,CH);ctx.closePath();ctx.fill();
}

let s=1; // used in forest vines
function drawFancyTree(x,y,h,alpha,lc,tc){
  ctx.save();ctx.globalAlpha=parseFloat(alpha);
  ctx.fillStyle=tc;ctx.fillRect(x-4,y-h*.32,8,h*.34);
  ctx.fillStyle=lc;
  for(let l=0;l<4;l++){
    const ly=y-h*(.2+l*.22),lw=(h*.65)*(1-l*.16);
    ctx.beginPath();ctx.moveTo(x,ly-h*.28-l*2);ctx.lineTo(x-lw/2,ly);ctx.lineTo(x+lw/2,ly);ctx.closePath();ctx.fill();
    // canopy detail — slightly lighter inner
    ctx.fillStyle='rgba(255,255,255,.04)';
    ctx.beginPath();ctx.moveTo(x,ly-h*.22-l*2);ctx.lineTo(x-lw*.35,ly);ctx.lineTo(x+lw*.35,ly);ctx.closePath();ctx.fill();
    ctx.fillStyle=lc;
  }
  ctx.restore();
}

// ════════════════════════════════════════════════════
// SCENARIO 2: PORTUGUESE SHIP AT SEA — detailed naval battle
// ════════════════════════════════════════════════════
function drawShipBG(){
  const t=G.time;

  // Stormy night sky
  const sk=ctx.createLinearGradient(0,0,0,CH*.58);
  sk.addColorStop(0,'#050a14');sk.addColorStop(.4,'#0a1428');sk.addColorStop(1,'#122040');
  ctx.fillStyle=sk;ctx.fillRect(0,0,CW,CH*.58);

  // Stars — twinkling
  for(let i=0;i<70;i++){
    const sx=(i*113+7)%CW,sy=(i*41+3)%(CH*.46);
    const br=(Math.sin(t*1.4+i)*.45+.55)*.85;
    ctx.beginPath();ctx.arc(sx,sy,i%5===0?1.5:.8,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,220,${br})`;ctx.fill();
  }

  // Moon — large, partially clouded

function drawBaseBar(x,y,w,hp){
  const p=Math.max(0,hp/MAX_HP);

  ctx.fillStyle='rgba(0,0,0,.65)';ctx.beginPath();safeRR(x,y,w,10,5);ctx.fill();

  ctx.strokeStyle='rgba(0,0,0,.45)';ctx.lineWidth=1;ctx.beginPath();safeRR(x,y,w,10,5);ctx.stroke();
  ctx.fillStyle=p>.3?'rgba(255,255,255,.8)':'rgba(255,200,200,.9)';
  ctx.font='bold 7px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(Math.max(0,Math.floor(hp)),x+w/2,y+5);
}

// ── SPAWN ──────────────────────────────────────────
function makeEnemy(defKey){
  const base=EDEFS[defKey];
  const diff=G.cfg.diff;
  // Scale stats by difficulty
  return{...base,
    hp:Math.round(base.hp*diff),
    dmg:Math.round(base.dmg*diff*.85),
    spd:base.spd*(1+(.15*(diff-1))),
    rate:base.rate/(1+(.1*(diff-1))), // faster attack
  };
}
function spawnUnit(defOrKey,defKey,side,px){
  let def=typeof defOrKey==='string'?UDEFS[defOrKey]:defOrKey;
  const spawnX=side==='player'?px:E_SPAWN_X+(Math.random()*22-11);
  const u={...def,id:G.uid++,x:spawnX,y:GY-def.sz,state:'walk',side,
    hp:def.hp,maxHp:def.hp,atkTimer:.1+Math.random()*def.rate,deadTimer:1.1,
    bobPhase:Math.random()*Math.PI*2,atkFlash:0,
    unitType:defKey||defOrKey,eType:def.eType||null};
  G.units.push(u);return u;
}
function placePlayerUnit(cx){
  const def=UDEFS[G.sel];
  if(!def||G.gold<def.cost||cx<P_BASE_X+65||cx>P_SPAWN_MAX) return;
  G.gold-=def.cost;spawnUnit(def,G.sel,'player',cx);
  addParts(cx,GY-def.sz,'#4aaa30',7,'hit');updateHUD();
}
function startWave(){
  const wi=Math.min(G.wave,G.cfg.waves.length-1);
  const wv=G.cfg.waves[wi];G.wave++;G.spawning=true;
  let delay=0;
  wv.forEach(({t,n})=>{for(let i=0;i<n;i++){G.spawnQ.push({t,delay,spawned:false});delay+=.48;}});
  addFloat(CW/2,95,`⚔️ ONDA ${G.wave}!`,'#cc3333',22);
  G.gold+=G.cfg.waveBonus;updateHUD();
}

// ── UNIT AI ────────────────────────────────────────
function findTarget(u){
  const enemies=G.units.filter(e=>e.side!==u.side&&e.state!=='dead');
  if(!enemies.length) return null;
  if(u.prio==='ranged'){
    const re=enemies.filter(e=>e.type==='ranged');
    if(re.length) return re.reduce((b,e)=>Math.abs(e.x-u.x)<Math.abs(b.x-u.x)?e:b,re[0]);
  }
  return enemies.reduce((b,e)=>Math.abs(e.x-u.x)<Math.abs(b.x-u.x)?e:b,enemies[0]);
}
function allyBlock(u){
  const ahead=u.side==='player'?1:-1;
  return G.units.some(a=>a!==u&&a.side===u.side&&a.state!=='dead'&&Math.abs(a.x-u.x)<u.sz*2.2&&(a.x-u.x)*ahead>0);
}
function killUnit(u,ks){
  u.state='dead';u.deadTimer=1.1;
  addParts(u.x,GY-u.sz*1.2,u.side==='player'?'#b07030':'#6a7a8a',14,'death');
  if(ks==='player'){G.kills++;G.gold+=22;addFloat(u.x,GY-u.sz*2.5,'+22 🪙','#e8c040',13);updateHUD();}
}
function fireProj(u,tgt,pType){
  G.proj.push({id:G.pid++,x:u.x,y:GY-u.sz*1.2,tx:tgt.x,ty:GY-tgt.sz,target:tgt,dmg:u.dmg,side:u.side,spd:490,dead:false,pType});
}
function updateUnit(u,dt){
  if(u.state==='dead'){u.deadTimer-=dt;return;}
  u.bobPhase=(u.bobPhase||0)+dt*9;
  if(u.atkFlash>0)u.atkFlash=Math.max(0,u.atkFlash-dt*4);
  const dir=u.side==='player'?1:-1;
  const wallX=u.side==='player'?E_BASE_WALL:P_BASE_WALL;
  if(u.type==='support'){
    u.atkTimer-=dt;
    const wa=G.units.filter(a=>a!==u&&a.side==='player'&&a.state!=='dead'&&a.hp<a.maxHp&&Math.abs(a.x-u.x)<u.rng);
    const ne=G.units.filter(e=>e.side!=='player'&&e.state!=='dead'&&Math.abs(e.x-u.x)<u.rng);
    if(wa.length||ne.length){
      u.state='attack';
      if(u.atkTimer<=0){u.atkTimer=u.rate;u.atkFlash=1;
        if(wa.length){wa.forEach(a=>{a.hp=Math.min(a.maxHp,a.hp+24);G.proj.push({id:G.pid++,x:u.x,y:GY-u.sz*1.2,tx:a.x,ty:GY-a.sz,target:a,dmg:0,side:'heal',spd:380,dead:false,pType:'orb'});});addFloat(u.x,GY-u.sz*2.5,'✨ Cura','#4aff80',12);}
        if(ne.length){const et=ne.reduce((b,e)=>Math.abs(e.x-u.x)<Math.abs(b.x-u.x)?e:b,ne[0]);fireProj(u,et,'orb');}
      }
    } else {if(!allyBlock(u))u.x+=dir*u.spd*.45*dt;u.state='walk';}
    return;
  }
  const tgt=findTarget(u);
  if(!tgt){
    const dw=Math.abs(wallX-u.x);
    if(dw>u.sz+6){if(!allyBlock(u))u.x+=dir*u.spd*dt;u.state='walk';}
    else{
      u.state='attack';u.atkTimer-=dt;
      if(u.atkTimer<=0){u.atkTimer=u.rate;u.atkFlash=1;
        if(u.side==='player'){G.eHP-=u.dmg;G.eFlash=.35;addParts(E_BASE_X-44,GY-80,'#cc3333',5,'hit');}
        else{G.pHP-=u.dmg;G.pFlash=.35;addParts(P_BASE_X+44,GY-80,'#cc3333',5,'hit');}
      }
    }
    return;
  }
  const d=Math.abs(tgt.x-u.x);
  if(d>u.rng){if(u.type==='ranged'||!allyBlock(u))u.x+=Math.sign(tgt.x-u.x)*u.spd*dt;u.state='walk';}
  else{
    u.state='attack';u.atkTimer-=dt;
    if(u.atkTimer<=0){u.atkTimer=u.rate;u.atkFlash=1;
      if(u.type==='ranged'){
        const pt=(u.eType==='crossbow')?'bolt':'arrow';fireProj(u,tgt,pt);
      } else {
        tgt.hp-=u.dmg;addParts(tgt.x,GY-tgt.sz,'#ff9030',6,'hit');
        if(tgt.hp<=0&&tgt.state!=='dead')killUnit(tgt,u.side);
      }
    }
  }
}
function updateProj(p,dt){
  if(p.dead) return;
  if(p.pType==='orb'&&p.side==='heal'){if(!p.target||p.target.state==='dead'){p.dead=true;return;}p.tx=p.target.x;p.ty=GY-p.target.sz;const dx=p.tx-p.x,dy=p.ty-p.y,d=Math.hypot(dx,dy);if(d<14){p.dead=true;return;}const sp=p.spd*dt/d;p.x+=dx*sp;p.y+=dy*sp;return;}
  if(!p.target||p.target.state==='dead'){p.dead=true;return;}
  p.tx=p.target.x;p.ty=GY-p.target.sz;
  const dx=p.tx-p.x,dy=p.ty-p.y,d=Math.hypot(dx,dy);
  if(d<14){p.target.hp-=p.dmg;addParts(p.target.x,GY-p.target.sz,'#ff9030',6,'hit');if(p.target.hp<=0&&p.target.state!=='dead')killUnit(p.target,p.side);p.dead=true;}
  else{const sp=p.spd*dt/d;p.x+=dx*sp;p.y+=dy*sp;}
}

// ── GAME LOOP ──────────────────────────────────────
function update(dt){
  G.time+=dt;
  G.goldT+=dt;if(G.goldT>=.38){G.gold+=2;G.goldT-=.38;updateHUD();}
  if(!G.spawning&&G.spawnQ.length===0){G.waveTimer-=dt;if(G.waveTimer<=0){startWave();G.waveTimer=G.cfg.waveInterval;}}
  G.spawnQ.forEach(sq=>sq.delay-=dt);
  G.spawnQ.filter(sq=>sq.delay<=0&&!sq.spawned).forEach(sq=>{sq.spawned=true;const scaled=makeEnemy(sq.t);spawnUnit(scaled,sq.t,'enemy',0);});
  if(G.spawnQ.length&&G.spawnQ.every(sq=>sq.spawned)){G.spawnQ=[];G.spawning=false;}
  G.units.forEach(u=>updateUnit(u,dt));
  G.units=G.units.filter(u=>!(u.state==='dead'&&u.deadTimer<=0));
  G.proj.forEach(p=>updateProj(p,dt));G.proj=G.proj.filter(p=>!p.dead);
  G.parts.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=290*dt;p.life-=dt;p.sz*=.97;});
  G.parts=G.parts.filter(p=>p.life>0);
  if(G.pFlash>0)G.pFlash-=dt*3;if(G.eFlash>0)G.eFlash-=dt*3;
  if(Math.floor(G.time*10)%4===0)updateHUD();
  if(G.eHP<=0&&G.running){G.running=false;G.screen='win';mapsBeaten.add(G.map);renderEndScreen(true);}
  else if(G.pHP<=0&&G.running){G.running=false;G.screen='lose';renderEndScreen(false);}
}
function renderFrame(){
  ctx.clearRect(0,0,CW,CH);
  if(G.map==='forest')drawForestBG();
  else if(G.map==='ship')drawShipBG();
  else drawVillageBG();
  drawDeployZone();
  [...G.units].sort((a,b)=>a.x-b.x).forEach(drawUnit);
  G.proj.forEach(drawProjectile);
  G.parts.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life/p.mxL);ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.5,p.sz),0,Math.PI*2);ctx.fillStyle=p.col;ctx.fill();ctx.globalAlpha=1;});
  drawBases();drawFloatTexts();
  ctx.strokeStyle='rgba(74,170,64,.14)';ctx.lineWidth=1.2;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(P_SPAWN_MAX,0);ctx.lineTo(P_SPAWN_MAX,CH);ctx.stroke();ctx.setLineDash([]);
  if(G.pFlash>0){ctx.fillStyle=`rgba(255,50,50,${G.pFlash*.28})`;ctx.fillRect(0,0,CW*.12,CH);}
  if(G.eFlash>0){ctx.fillStyle=`rgba(255,50,50,${G.eFlash*.28})`;ctx.fillRect(CW*.88,0,CW*.12,CH);}
}
function gameLoop(ts){
  const dt=Math.min((ts-(lastTs||ts))/1000,.05);lastTs=ts;
  update(dt);
  if(G.screen==='game'){renderFrame();raf=requestAnimationFrame(gameLoop);}
}

// ── HUD ────────────────────────────────────────────
function updateHUD(){
  const gv=document.getElementById('gv');if(gv)gv.textContent=Math.floor(G.gold);
  const wl=document.getElementById('wl');if(wl){const total=G.cfg.waves.length;wl.textContent=`ONDA ${G.wave}/${total}`;}
  const wt=document.getElementById('wt');
  if(wt){const s=Math.ceil(Math.max(0,G.waveTimer));
    if(G.spawning){wt.textContent='⚔️ ONDA EM CURSO';wt.className='wave-timer urgent';}
    else if(s<=5){wt.textContent=`ONDA EM ${s}s!`;wt.className='wave-timer urgent';}
    else{wt.textContent=`Próxima: ${s}s`;wt.className='wave-timer';}}
  const pf=document.getElementById('phf');if(pf)pf.style.width=`${Math.max(0,G.pHP/MAX_HP)*100}%`;
  const ef=document.getElementById('ehf');if(ef)ef.style.width=`${Math.max(0,G.eHP/MAX_HP)*100}%`;
  const pv=document.getElementById('phv');if(pv)pv.textContent=Math.max(0,Math.floor(G.pHP));
  const ev=document.getElementById('ehv');if(ev)ev.textContent=Math.max(0,Math.floor(G.eHP));
  Object.keys(UDEFS).forEach(k=>{const b=document.getElementById(`ub-${k}`);if(b)b.className='ubtn'+(G.gold<UDEFS[k].cost?' disabled':'')+(G.sel===k?' selected':'');});
}
function unitPanelHTML(){
  return Object.entries(UDEFS).map(([k,d])=>`
    <div class="ubtn${G.sel===k?' selected':''}" id="ub-${k}" onclick="selUnit('${k}')">
      <div class="ubtn-emoji">${d.em}</div>
      <div class="ubtn-name">${d.nm}</div>
      <div class="ubtn-cost">🪙 ${d.cost}</div>
      <div class="ubtn-hp">❤ ${d.hp}</div>
    </div>`).join('');
}

// ── SCREENS ────────────────────────────────────────
function genEmbers(n,col){return Array.from({length:n},()=>{const x=Math.random()*100,d=4+Math.random()*8,dl=-Math.random()*12,sz=2+Math.random()*5;return`<div class="t-ember" style="left:${x}%;animation-duration:${d}s;animation-delay:${dl}s;width:${sz}px;height:${sz}px;background:radial-gradient(circle,${col},transparent)"></div>`;}).join('')}

function renderMapSelect(){
  document.getElementById('app').innerHTML=`
  <div class="map-select">
    ${genEmbers(22,'#e8a030')}${genEmbers(10,'#4aaa40')}
    <div style="position:relative;z-index:1;width:100%;text-align:center">
      <div class="ms-eye">⬥ Escolha o Campo de Batalha ⬥</div>
      <h1 class="ms-title">Guerreiros da Floresta</h1>
      <p class="ms-sub">Battle Simulator · Clash Royale Style</p>
      <div class="ms-div"></div>
      <div class="map-cards">
        ${Object.entries(MAPS).map(([k,m])=>`
        <div class="map-card" onclick="startGame('${k}')">
          <div class="map-card-thumb" style="background:${m.sky||'linear-gradient(#111,#222)'}">
            <span style="filter:drop-shadow(0 0 14px rgba(255,255,255,.35));font-size:4rem">${m.icon}</span>
            <div class="map-card-badge">${m.badge}</div>
            ${mapsBeaten.has(k)?'<div class="map-card-beaten">✓ Vencido</div>':''}
          </div>
          <div class="map-card-body">
            <div class="map-card-name">${m.nm}</div>
            <div class="map-card-desc">${m.desc}</div>
            <span class="diff-badge ${m.diffCls}">${m.diff}</span>
          </div>
        </div>`).join('')}
      </div>
      <div style="animation:fadeIn .8s 1s both;margin-top:4px">
        <p style="font-size:.76rem;color:var(--dim);font-style:italic;margin-bottom:12px;line-height:1.9">
          Clique no lado <strong style="color:var(--grn)">esquerdo</strong> do campo para posicionar suas tropas.<br>
          Destrua a <strong style="color:var(--red)">fortaleza inimiga</strong> antes que destruam a sua!
        </p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;font-size:.7rem;color:var(--dim)">
          ${Object.entries(UDEFS).map(([,d])=>`<span title="${d.desc}">${d.em} ${d.nm} 🪙${d.cost}</span>`).join('')}
        </div>
      </div>
    </div>
    <div class="t-trees">🌳🌲🌿🌳🌲🌿🌳🌲🌿🌳🌲🌿🌳🌲🌿🌳🌲🌿</div>
  </div>`;
}

function startGame(map){
  initState(map);
  document.getElementById('app').innerHTML=`
  <div class="game-wrap">
    <div class="hud-bar">
      <div class="hud-base">
        <span class="base-icon">🏚️</span>
        <div class="base-hp-wrap">
          <div class="base-hp-track"><div id="phf" class="base-hp-fill p-fill" style="width:100%"></div></div>
          <span id="phv" class="base-hp-val">${MAX_HP}</span>
        </div>
      </div>
      <div class="hud-center">
        <div id="wl" class="wave-lbl">ONDA 0/${MAP_CFG[map].waves.length}</div>
        <div id="wt" class="wave-timer">Inicia em: 12s</div>
        <div class="gold-disp">🪙 <span id="gv">160</span></div>
      </div>
      <div class="hud-base right">
        <div class="base-hp-wrap" style="text-align:right">
          <div class="base-hp-track"><div id="ehf" class="base-hp-fill e-fill" style="width:100%"></div></div>
          <span id="ehv" class="base-hp-val">${MAX_HP}</span>
        </div>
        <span class="base-icon">🏰</span>
      </div>
    </div>
    <div class="canvas-wrap"><canvas id="gc" width="${CW}" height="${CH}"></canvas></div>
    <div class="unit-panel">${unitPanelHTML()}</div>
  </div>`;
  canvas=document.getElementById('gc');ctx=canvas.getContext('2d');
  canvas.addEventListener('click',e=>{const r=canvas.getBoundingClientRect();placePlayerUnit((e.clientX-r.left)*(CW/r.width));});
  canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mouseX=(e.clientX-r.left)*(CW/r.width);mouseY=(e.clientY-r.top)*(CH/r.height);});
  canvas.addEventListener('mouseleave',()=>{mouseX=-9;mouseY=-9;});
  canvas.addEventListener('touchstart',e=>{e.preventDefault();const r=canvas.getBoundingClientRect(),t=e.touches[0];placePlayerUnit((t.clientX-r.left)*(CW/r.width));},{passive:false});
  G.floats=[];updateHUD();lastTs=0;raf=requestAnimationFrame(gameLoop);
}

function renderEndScreen(won){
  const dur=Math.floor(G.time),min=Math.floor(dur/60),sec=dur%60;
  if(won&&G.map==='village'){
    document.getElementById('app').innerHTML=`
    <div class="end-wrap" style="background:radial-gradient(ellipse at 50% 30%,rgba(80,40,10,.6),var(--bg) 65%);overflow:hidden">
      ${genEmbers(40,'#e8c040')}${genEmbers(24,'#ff8030')}${genEmbers(14,'#4aff80')}
      <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;max-width:700px;margin:0 auto">
        <div class="stars-row" style="animation-delay:.1s">🌟 🏆 🌟</div>
        <div class="stars-row" style="font-size:1.8rem;letter-spacing:12px;animation-delay:.3s">⚔️ 🪶 🏹 ✨ 🗡️</div>
        <h1 class="congrats-title">Parabéns!</h1>
        <div class="congrats-sub">⬥ Todos os Mapas Conquistados ⬥</div>
        <div style="width:280px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:10px auto 18px;animation:fadeIn 1s .6s both"></div>
        <p class="end-sub" style="color:var(--glt);font-size:1.05rem;animation-delay:.7s;text-align:center">
          Em terra, no mar e entre as chamas —<br>os guerreiros jamais recuaram.<br>
          <em style="color:var(--dim);font-size:.9rem">A memória dos povos ancestrais do Brasil vive para sempre.</em>
        </p>
        <div class="end-stats" style="animation-delay:.9s">
          <div class="estat"><div class="ei">⚔️</div><div class="el">Inimigos</div><div class="ev" style="color:var(--grn)">${G.kills}</div></div>
          <div class="estat"><div class="ei">🌊</div><div class="el">Ondas</div><div class="ev" style="color:var(--gold)">${G.wave}</div></div>
          <div class="estat"><div class="ei">⏱️</div><div class="el">Duração</div><div class="ev" style="color:var(--dim)">${min}:${sec<10?'0'+sec:sec}</div></div>
        </div>
        <div class="flex-row">
          <button class="btn-primary" style="background:linear-gradient(135deg,#7a5010,#4a3008);border-color:var(--glt);font-size:1rem;padding:14px 44px" onclick="mapsBeaten.clear();renderMapSelect()">🗺️ JOGAR NOVAMENTE</button>
        </div>
        <p style="margin-top:18px;font-size:.68rem;color:var(--dim);font-style:italic;animation:fadeIn 1s 1.4s both">Em memória dos povos indígenas do Brasil.</p>
      </div>
    </div>`;
    return;
  }
  document.getElementById('app').innerHTML=`
  <div class="end-wrap" style="background:radial-gradient(ellipse at 50% 30%,rgba(${won?'38,89,33':'80,20,20'},.42),var(--bg) 65%)">
    ${genEmbers(22,won?'#4aaa40':'#cc3333')}${won?genEmbers(8,'#e8c040'):''}
    <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center">
      <div style="font-size:4rem;margin-bottom:12px;filter:drop-shadow(0 0 26px rgba(${won?'74,170,64':'204,51,51'},.55));animation:pulse 2s infinite">${won?'🌳':'🔥'}</div>
      <h1 class="${won?'vic':'def'}-title">${won?'A Floresta Venceu!':'A Aldeia Caiu!'}</h1>
      <p class="end-sub" style="color:var(--text)">${won?
        'Com bravura e estratégia, os guerreiros destruíram a fortaleza portuguesa.<br>A floresta permanece livre!':
        'Os portugueses derrubaram nossas defesas.<br>Mas a floresta não esquece. Tente novamente!'}</p>
      <div class="end-stats">
        <div class="estat"><div class="ei">⚔️</div><div class="el">Inimigos</div><div class="ev" style="color:var(--grn)">${G.kills}</div></div>
        <div class="estat"><div class="ei">🌊</div><div class="el">Ondas</div><div class="ev" style="color:var(--gold)">${G.wave}</div></div>
        <div class="estat"><div class="ei">⏱️</div><div class="el">Duração</div><div class="ev" style="color:var(--dim)">${min}:${sec<10?'0'+sec:sec}</div></div>
      </div>
      <div class="flex-row">
        <button class="btn-primary" onclick="renderMapSelect()">🗺️ OUTRO MAPA</button>
        <button class="btn-primary" style="background:linear-gradient(135deg,#6a1a0a,#4a0808);border-color:var(--red)" onclick="startGame('${G.map}')">🔄 TENTAR NOVAMENTE</button>
      </div>
    </div>
  </div>`;
}
function selUnit(k){G.sel=k;updateHUD();}
renderMapSelect();
</script>
