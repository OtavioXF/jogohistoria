<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guerreiros da Floresta</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--bg:#060d07;--s:#111d12;--s2:#172714;--bd:#243825;--gold:#c9971a;--glt:#e8c040;--gdim:#7a5c0a;--red:#cc3333;--grn:#4aaa30;--text:#e0c890;--dim:#7a6a42}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'IM Fell English',serif;min-height:100vh;overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{text-shadow:0 0 40px rgba(201,151,26,.5)}50%{text-shadow:0 0 90px rgba(201,151,26,1)}}
@keyframes fireGlow{0%,100%{text-shadow:0 0 20px rgba(200,60,30,.6)}50%{text-shadow:0 0 60px rgba(200,60,30,1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes floatUp{0%{transform:translateY(100vh);opacity:0}10%{opacity:.9}90%{opacity:.5}100%{transform:translateY(-30px);opacity:0}}
@keyframes popIn{from{opacity:0;transform:scale(.82)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.map-select{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;position:relative;overflow:hidden;
background:radial-gradient(ellipse at 35% 20%,rgba(38,89,33,.35),transparent 55%),linear-gradient(180deg,#060d07,#0c1a0d 45%,#060d07)}
.t-ember{position:absolute;border-radius:50%;pointer-events:none;animation:floatUp linear infinite}
.t-trees{position:absolute;bottom:0;left:0;right:0;font-size:3rem;line-height:1;opacity:.15;letter-spacing:10px;pointer-events:none}
.ms-title{font-family:'Cinzel Decorative',cursive;font-size:clamp(1.8rem,4.5vw,3.5rem);color:var(--glt);animation:glow 3s infinite,popIn .8s ease both;margin-bottom:.3em}
.ms-eye{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:8px;color:#c84020;text-transform:uppercase;margin-bottom:12px;animation:fadeIn .8s ease .2s both}
.ms-sub{font-family:'Cinzel',serif;font-size:.74rem;color:var(--dim);letter-spacing:5px;text-transform:uppercase;margin-bottom:1.5rem;animation:fadeIn .8s .4s both}
.ms-div{width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--gdim),transparent);margin:0 auto 1.5rem;animation:fadeIn .8s .5s both}
.map-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;animation:slideUp .8s .6s both;margin-bottom:1.5rem}
.map-card{width:220px;cursor:pointer;border-radius:8px;overflow:hidden;border:2px solid var(--bd);transition:all .3s;background:var(--s)}
.map-card:hover{border-color:var(--gold);transform:translateY(-6px);box-shadow:0 12px 40px rgba(0,0,0,.6),0 0 20px rgba(201,151,26,.2)}
.map-card-thumb{height:130px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:3.5rem}
.map-card-body{padding:12px}
.map-card-name{font-family:'Cinzel',serif;font-size:.85rem;color:var(--glt);letter-spacing:2px;margin-bottom:4px}
.map-card-desc{font-size:.7rem;color:var(--dim);font-style:italic;line-height:1.6}
.map-card-badge{position:absolute;top:8px;right:8px;font-family:'Cinzel',serif;font-size:.56rem;color:var(--gold);background:rgba(0,0,0,.65);padding:2px 7px;border-radius:2px;letter-spacing:1px;border:1px solid var(--gdim)}

.game-wrap{flex:1;display:flex;flex-direction:column;background:#000;overflow:hidden;height:100vh}
.hud-bar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:7px 14px;background:linear-gradient(90deg,var(--s),var(--s2));border-bottom:2px solid var(--bd);flex-shrink:0;gap:8px}
.hud-base{display:flex;align-items:center;gap:7px}
.hud-base.right{flex-direction:row-reverse}
.base-icon{font-size:1.3rem}
.base-hp-wrap{flex:1}
.base-hp-track{height:9px;background:rgba(0,0,0,.5);border-radius:5px;overflow:hidden;border:1px solid var(--bd);min-width:80px}
.base-hp-fill{height:100%;border-radius:5px;transition:width .3s}
.p-fill{background:linear-gradient(90deg,#2a8a20,#40aa30)}
.e-fill{background:linear-gradient(90deg,#8b1f1f,#cc3333)}
.base-hp-val{font-family:'Cinzel',serif;font-size:.7rem;min-width:28px;display:block;text-align:center;color:var(--text)}
.hud-center{text-align:center;display:flex;flex-direction:column;gap:2px}
.wave-lbl{font-family:'Cinzel',serif;font-size:.68rem;color:var(--gold);letter-spacing:2px;text-transform:uppercase}
.wave-timer{font-size:.72rem;color:var(--dim);transition:color .3s}
.wave-timer.urgent{color:var(--red);animation:pulse 1s infinite}
.gold-disp{font-family:'Cinzel',serif;font-size:.8rem;color:var(--glt);letter-spacing:1px}
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#000;position:relative;min-height:0}
#gc{display:block;max-width:100%;max-height:100%;object-fit:contain}
.unit-panel{display:flex;gap:7px;padding:8px 10px;background:linear-gradient(0deg,var(--s2),var(--s));border-top:2px solid var(--bd);flex-shrink:0;flex-wrap:wrap;justify-content:center;overflow-x:auto}
.ubtn{display:flex;flex-direction:column;align-items:center;padding:7px 11px;background:linear-gradient(145deg,var(--s2),var(--s));border:2px solid var(--bd);border-radius:6px;cursor:pointer;transition:all .2s;min-width:68px;position:relative;overflow:hidden}
.ubtn:hover:not(.disabled){border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.5),0 0 12px rgba(201,151,26,.15)}
.ubtn.selected{border-color:var(--gold);background:linear-gradient(145deg,rgba(201,151,26,.2),rgba(201,151,26,.08));box-shadow:0 0 16px rgba(201,151,26,.3)}
.ubtn.disabled{opacity:.35;cursor:not-allowed}
.ubtn-emoji{font-size:1.5rem;margin-bottom:2px;line-height:1}
.ubtn-name{font-family:'Cinzel',serif;font-size:.58rem;color:var(--gold);letter-spacing:.5px;white-space:nowrap;margin-bottom:1px}
.ubtn-cost{font-size:.62rem;color:var(--dim)}
.ubtn-hp{font-size:.56rem;color:rgba(74,170,64,.7)}
.ubtn.selected .ubtn-name{color:var(--glt)}
.ubtn-count{position:absolute;top:3px;right:4px;font-family:'Cinzel',serif;font-size:.52rem;color:var(--gold);background:rgba(0,0,0,.6);padding:1px 4px;border-radius:2px}

.end-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px 20px;position:relative;overflow:hidden}
.vic-title{font-family:'Cinzel Decorative',cursive;font-size:clamp(1.8rem,4.5vw,3.2rem);color:var(--glt);animation:glow 2s infinite;margin-bottom:12px}
.def-title{font-family:'Cinzel Decorative',cursive;font-size:clamp(1.8rem,4.5vw,3.2rem);color:var(--red);animation:fireGlow 2s infinite;margin-bottom:12px}
.end-sub{font-size:.95rem;max-width:500px;line-height:1.9;font-style:italic;margin-bottom:24px;animation:fadeIn 1s .4s both}
.end-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:480px;margin-bottom:22px;animation:fadeIn 1s .6s both}
.estat{background:var(--s);border:1px solid var(--bd);padding:10px;text-align:center;border-radius:4px}
.estat .ei{font-size:1.4rem}.estat .el{font-size:.6rem;color:var(--dim);margin:2px 0;text-transform:uppercase;letter-spacing:1px}.estat .ev{font-family:'Cinzel',serif;font-size:1.2rem}
.btn-primary{font-family:'Cinzel',serif;letter-spacing:2px;cursor:pointer;background:linear-gradient(135deg,#3a7a30,#2a5a22);color:var(--glt);border:2px solid var(--gold);padding:12px 38px;font-size:.9rem;transition:all .25s}
.btn-primary:hover{background:linear-gradient(135deg,#4a9a40,#3a7a30);box-shadow:0 0 30px rgba(201,151,26,.3);transform:translateY(-2px)}
.flex-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

@media(max-width:600px){.unit-panel{gap:4px;padding:5px 6px}.ubtn{min-width:56px;padding:5px 7px}.ubtn-emoji{font-size:1.2rem}.hud-bar{padding:5px 8px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════
const CW=960,CH=420,GY=358;
const P_BASE_X=52,E_BASE_X=CW-52;
const DEPLOY_MAX_X=Math.floor(CW*0.38);
const MAX_HP=1000;
const MAX_PARTS=300;

// ════════════════════════════════════════════════════
// UNIT DEFS
// ════════════════════════════════════════════════════
const UDEFS={
  warrior: {nm:'Guerreiro', em:'⚔️',cost:50, hp:160,dmg:28,spd:62,rng:44,rate:1.1,sz:22,type:'melee',   desc:'Combatente equilibrado'},
  archer:  {nm:'Arqueiro',  em:'🏹',cost:75, hp:75, dmg:38,spd:48,rng:230,rate:1.9,sz:19,type:'ranged',  desc:'Ataque a distância'},
  spear:   {nm:'Lanceiro',  em:'🗡️',cost:65, hp:130,dmg:32,spd:55,rng:68,rate:1.0,sz:21,type:'melee',   desc:'Lança longa, trava múltiplos'},
  shaman:  {nm:'Xamã',      em:'✨',cost:110,hp:110,dmg:0, spd:44,rng:130,rate:2.2,sz:20,type:'support', desc:'Cura aliados próximos'},
  chief:   {nm:'Cacique',   em:'🪶',cost:160,hp:320,dmg:60,spd:38,rng:50,rate:2.1,sz:26,type:'melee',   desc:'Herói — alto HP e dano'},
};
const EDEFS={
  soldier:     {nm:'Soldado',     hp:110,dmg:22,spd:53,rng:42,rate:1.3,sz:21,type:'melee', eType:'soldier'},
  arquebusier: {nm:'Arcabuzeiro', hp:72, dmg:42,spd:43,rng:195,rate:2.3,sz:18,type:'ranged',eType:'arquebusier'},
  captain:     {nm:'Capitão',     hp:280,dmg:48,spd:43,rng:46,rate:1.9,sz:25,type:'melee', eType:'captain'},
  musketeer:   {nm:'Mosqueteiro', hp:85, dmg:58,spd:36,rng:240,rate:2.9,sz:18,type:'ranged',eType:'musketeer'},
};
const WAVES=[
  [{t:'soldier',n:3}],
  [{t:'soldier',n:4},{t:'arquebusier',n:1}],
  [{t:'soldier',n:3},{t:'arquebusier',n:2}],
  [{t:'soldier',n:2},{t:'captain',n:1},{t:'arquebusier',n:2}],
  [{t:'captain',n:2},{t:'musketeer',n:2}],
  [{t:'soldier',n:3},{t:'captain',n:2},{t:'musketeer',n:2}],
  [{t:'captain',n:3},{t:'musketeer',n:3}],
  [{t:'soldier',n:4},{t:'captain',n:3},{t:'musketeer',n:3}],
];
const MAPS={
  forest: {nm:'Floresta Sagrada',icon:'🌳',badge:'MAPA 1',desc:'Combata nas sombras da floresta ancestral.',sky:'linear-gradient(160deg,#0d2a0d,#1a4a12,#2a6a1a)'},
  ship:   {nm:'Navio em Alto Mar',icon:'⛵',badge:'MAPA 2',desc:'Batalha no convés de um navio português.',sky:'linear-gradient(160deg,#08101e,#1a3050,#0a2040)'},
  village:{nm:'Aldeia em Chamas',icon:'🏚️',badge:'MAPA 3',desc:'Defendam a aldeia enquanto o horizonte arde.',sky:'linear-gradient(160deg,#2a0808,#7a2010,#c06030)'},
};

// ════════════════════════════════════════════════════
// GAME STATE
// ════════════════════════════════════════════════════
let G={},ctx,canvas,raf,mouseX=-9,mouseY=-9,lastTs=0;
function initState(map){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  G={map,screen:'game',pHP:MAX_HP,eHP:MAX_HP,gold:150,goldT:0,
    wave:0,waveTimer:10,spawning:false,spawnQ:[],
    units:[],proj:[],parts:[],floats:[],
    uid:0,pid:0,sel:'warrior',time:0,kills:0,
    pFlash:0,eFlash:0,running:true};
}

// ════════════════════════════════════════════════════
// DRAW HELPERS — FIX: cap() uses Math.abs to prevent negative radius
// ════════════════════════════════════════════════════
function cap(x,y,w,h,r){
  // Always use absolute values so negative w/h/r never crash roundRect
  const aw=Math.abs(w), ah=Math.abs(h);
  const ar=Math.abs(r!==undefined ? r : aw/2);
  // Clamp radius so it never exceeds half of the smaller dimension
  const safeR=Math.min(ar, aw/2, ah/2);
  ctx.beginPath();
  ctx.roundRect(x-aw/2, y, aw, ah, safeR);
  ctx.fill();
}

function limb(ox,oy,w,h,angle,col){
  ctx.save();ctx.translate(ox,oy);ctx.rotate(angle);
  ctx.fillStyle=col;
  cap(0,0,w,h);
  ctx.restore();
}

// Safe roundRect helper — clamps radius to valid range
function safeRR(x,y,w,h,r){
  const aw=Math.abs(w), ah=Math.abs(h);
  const ar=Math.min(Math.abs(r), aw/2, ah/2);
  ctx.roundRect(x,y,aw,ah,ar);
}

// Draw a single feather
function feather(cx,cy,len,angle,col){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(angle);
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.ellipse(0,-len/2,Math.abs(len*.18),Math.abs(len*.5),0,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=.8;
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-len);ctx.stroke();
  ctx.restore();
}

// ════════════════════════════════════════════════════
// INDIGENOUS CHARACTER DRAWING
// ════════════════════════════════════════════════════
const SKIN_IND='#b07030',CLOTH_IND='#4a2010',
      PAINT1='#cc2010',PAINT2='#2060c0',PAINT3='#e8c030';
const FEATH_COLS=['#e03010','#e8b010','#20a030','#e86010','#2050c0','#c020a0','#30c050'];

function drawIndigenous(u){
  const x=u.x, s=u.sz/22;
  const ph=u.bobPhase||0;
  const walking=u.state==='walk';
  const atk=u.atkFlash>0;
  const dead=u.state==='dead';

  const LL=17*s,BH=14*s,HR=7*s,BW=10*s,LW=4.5*s,AW=3.5*s;
  const hipY=GY-LL,shY=hipY-BH,headY=shY-HR*1.3;
  const legSw=walking?Math.sin(ph*2)*.45:0;
  const armSw=walking?-legSw*.65:0;
  const atkAngle=atk?-1.1:0.15;

  ctx.save();
  if(dead){
    const fallAng=(1.1-u.deadTimer)*Math.PI*.55;
    ctx.translate(x,GY);ctx.rotate(fallAng);ctx.translate(-x,-GY);
    ctx.globalAlpha=Math.max(0,u.deadTimer*.85);
  }

  // Shadow
  ctx.beginPath();ctx.ellipse(x,GY,u.sz*.9,u.sz*.22,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.28)';ctx.fill();

  // Back leg
  ctx.fillStyle=SKIN_IND;
  limb(x-LW*.5,hipY,-LW,LL*.52,legSw*-.8,SKIN_IND);
  limb(x-LW*.5+Math.sin(-legSw*.8)*LL*.52,hipY+Math.cos(-legSw*.8)*LL*.52,-LW*.85,LL*.5,legSw*.4,SKIN_IND);

  // Body (skin + paint)
  ctx.fillStyle=SKIN_IND;
  ctx.beginPath();safeRR(x-BW*.45,shY,BW*.9,BH*.6,3*s);ctx.fill();
  ctx.fillStyle=PAINT1;
  ctx.fillRect(x-BW*.35,shY+2*s,BW*.28,BH*.35);
  ctx.fillRect(x+BW*.08,shY+2*s,BW*.28,BH*.35);
  ctx.fillStyle=PAINT2;
  ctx.fillRect(x-BW*.35,shY+BH*.22,BW*.28,BH*.15);
  ctx.fillRect(x+BW*.08,shY+BH*.22,BW*.28,BH*.15);
  // Loincloth
  ctx.fillStyle=CLOTH_IND;
  ctx.beginPath();safeRR(x-BW*.6,hipY-BH*.4,BW*1.2,BH*.45,2*s);ctx.fill();
  // Belt
  ctx.fillStyle=PAINT3;
  ctx.beginPath();safeRR(x-BW*.55,hipY-BH*.42,BW*1.1,3*s,1*s);ctx.fill();

  // Back arm
  const bArmA=armSw*(atk?0.3:1);
  limb(x-BW*.35,shY+BH*.12,-AW,BH*.55,bArmA+.15,SKIN_IND);
  limb(x-BW*.35+Math.sin(bArmA+.15)*BH*.55,shY+BH*.12+Math.cos(bArmA+.15)*BH*.55,-AW*.8,BH*.45,bArmA*.6-.1,SKIN_IND);

  // Front leg
  limb(x+LW*.5,hipY,-LW,LL*.52,legSw*.8,SKIN_IND);
  limb(x+LW*.5+Math.sin(legSw*.8)*LL*.52,hipY+Math.cos(legSw*.8)*LL*.52,-LW*.85,LL*.5,-legSw*.4,SKIN_IND);

  // Head
  ctx.beginPath();ctx.arc(x,headY,HR,0,Math.PI*2);
  ctx.fillStyle=SKIN_IND;ctx.fill();
  ctx.fillStyle=PAINT1;
  ctx.fillRect(x+HR*.2,headY-HR*.3,HR*.7,HR*.22);
  ctx.fillRect(x+HR*.2,headY+HR*.05,HR*.7,HR*.22);
  ctx.fillStyle=PAINT3;
  ctx.fillRect(x+HR*.2,headY-HR*.1,HR*.7,HR*.12);
  // Eye
  ctx.beginPath();ctx.arc(x+HR*.42,headY-HR*.15,HR*.22,0,Math.PI*2);
  ctx.fillStyle='#1a0a00';ctx.fill();
  ctx.beginPath();ctx.arc(x+HR*.5,headY-HR*.2,HR*.1,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();
  // Nostril
  ctx.fillStyle='#7a4015';
  ctx.beginPath();ctx.arc(x+HR*.7,headY+HR*.15,HR*.1,0,Math.PI*2);ctx.fill();
  // Headband
  ctx.strokeStyle=PAINT1;ctx.lineWidth=1.8*s;
  ctx.beginPath();ctx.arc(x,headY,HR+1*s,Math.PI*.7,Math.PI*.3,false);ctx.stroke();
  ctx.strokeStyle=PAINT3;ctx.lineWidth=.8*s;
  ctx.beginPath();ctx.arc(x,headY,HR+1*s,Math.PI*.7,Math.PI*.3,false);ctx.stroke();

  // Feather headdress
  const numF=u.unitType==='chief'?9:u.unitType==='shaman'?6:5;
  const fLen=HR*(u.unitType==='chief'?2.8:u.unitType==='shaman'?2.2:1.9)*s;
  for(let f=0;f<numF;f++){
    const r=f/(numF-1);
    const baseAngle=Math.PI*(.15+r*.7);
    const wobble=Math.sin(ph*.9+f*.7)*.04;
    const fanAng=-Math.PI/2-Math.PI*(.35-r*.7)+wobble;
    const bx=x+Math.cos(Math.PI-baseAngle)*HR*.6;
    const by=headY+Math.sin(Math.PI-baseAngle)*HR*.6;
    feather(bx,by,fLen,fanAng-Math.PI/2,FEATH_COLS[f%FEATH_COLS.length]);
  }

  // Weapon (front arm)
  const fArmA=armSw*(atk?0:1)+(atk?atkAngle:0.15);
  const handX=x+BW*.35+Math.sin(fArmA)*BH*.55+Math.sin(fArmA*.6-.1)*BH*.45;
  const handY=shY+BH*.12+Math.cos(fArmA)*BH*.55+Math.cos(fArmA*.6-.1)*BH*.45;
  drawIndWeapon(handX,handY,u.unitType,s,fArmA,atk);

  // Front arm (drawn over weapon hand)
  limb(x+BW*.35,shY+BH*.12,-AW,BH*.55,fArmA,SKIN_IND);
  limb(x+BW*.35+Math.sin(fArmA)*BH*.55,shY+BH*.12+Math.cos(fArmA)*BH*.55,-AW*.8,BH*.45,fArmA*.6-.1,SKIN_IND);

  ctx.restore();
}

function drawIndWeapon(wx,wy,unitType,s,armAngle,atk){
  ctx.save();ctx.translate(wx,wy);
  const ang=armAngle+.15;
  switch(unitType){
    case 'warrior':
      ctx.rotate(ang);
      ctx.fillStyle='#5a2a08';
      ctx.beginPath();safeRR(-2*s,-14*s,4*s,14*s,2*s);ctx.fill();
      ctx.fillStyle='#7a3a10';
      ctx.beginPath();ctx.ellipse(0,-18*s,5*s,6*s,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=.8;ctx.stroke();
      break;
    case 'archer':
      ctx.rotate(ang+.4);
      ctx.strokeStyle='#5a3010';ctx.lineWidth=2.5*s;
      ctx.beginPath();ctx.arc(3*s,0,10*s,Math.PI*.3,Math.PI*1.7);ctx.stroke();
      ctx.strokeStyle='#d4aa60';ctx.lineWidth=.8;
      ctx.beginPath();
      ctx.moveTo(3*s+10*s*Math.cos(Math.PI*.3),10*s*Math.sin(Math.PI*.3));
      ctx.lineTo(3*s+10*s*Math.cos(Math.PI*1.7),10*s*Math.sin(Math.PI*1.7));ctx.stroke();
      if(atk){
        ctx.strokeStyle='#c8a040';ctx.lineWidth=1.2;
        ctx.beginPath();ctx.moveTo(-2*s,-8*s);ctx.lineTo(12*s,-8*s);ctx.stroke();
        ctx.fillStyle='#8a5020';
        ctx.beginPath();ctx.moveTo(12*s,-8*s);ctx.lineTo(9*s,-10*s);ctx.lineTo(9*s,-6*s);ctx.closePath();ctx.fill();
      }
      break;
    case 'spear':
      ctx.rotate(ang);
      ctx.fillStyle='#5a2a08';
      ctx.beginPath();safeRR(-1.5*s,-24*s,3*s,24*s,1.5*s);ctx.fill();
      ctx.fillStyle='#c0c0d0';
      ctx.beginPath();ctx.moveTo(0,-24*s);ctx.lineTo(-2.5*s,-18*s);ctx.lineTo(2.5*s,-18*s);ctx.closePath();ctx.fill();
      break;
    case 'shaman':
      ctx.rotate(ang);
      ctx.fillStyle='#4a3010';
      ctx.beginPath();safeRR(-1.5*s,-22*s,3*s,22*s,1.5*s);ctx.fill();
      const grd=ctx.createRadialGradient(0,-23*s,0,0,-23*s,5*s);
      grd.addColorStop(0,'rgba(180,100,255,1)');grd.addColorStop(1,'rgba(100,50,180,0)');
      ctx.fillStyle=grd;ctx.beginPath();ctx.arc(0,-23*s,5*s,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(0,-23*s,3*s,0,Math.PI*2);ctx.fillStyle='#c080ff';ctx.fill();
      break;
    case 'chief':
      ctx.rotate(ang);
      ctx.fillStyle='#5a2a08';
      ctx.beginPath();safeRR(-2.5*s,-18*s,5*s,18*s,2.5*s);ctx.fill();
      ctx.fillStyle='#909090';
      ctx.beginPath();ctx.moveTo(-1*s,-18*s);ctx.lineTo(-7*s,-24*s);ctx.lineTo(-7*s,-14*s);ctx.lineTo(-1*s,-12*s);ctx.closePath();ctx.fill();
      ctx.fillStyle='#c0c0c0';
      ctx.beginPath();ctx.moveTo(-1*s,-18*s);ctx.lineTo(-5*s,-22*s);ctx.lineTo(-5*s,-15*s);ctx.closePath();ctx.fill();
      break;
  }
  ctx.restore();
}

// ════════════════════════════════════════════════════
// PORTUGUESE CHARACTER DRAWING
// ════════════════════════════════════════════════════
function drawPortuguese(u){
  const x=u.x, s=u.sz/21;
  const ph=u.bobPhase||0;
  const walking=u.state==='walk';
  const atk=u.atkFlash>0;
  const dead=u.state==='dead';
  const eType=u.eType||'soldier';

  const ARMOR=eType==='captain'?'#8a5a40':'#6a7a8a';
  const ARMOR2=eType==='captain'?'#a06a50':'#7a8a9a';
  const PANTS=eType==='captain'?'#4a2020':'#2a3a50';
  const SKIN_PT='#d4a86a';

  const LL=16*s,BH=13*s,HR=6.5*s,BW=10*s,LW=4*s,AW=3.5*s;
  const hipY=GY-LL,shY=hipY-BH,headY=shY-HR*1.3;
  const legSw=walking?Math.sin(ph*2)*.42:0;
  const armSw=walking?-legSw*.65:0;
  const atkAngle=atk?-1.0:0.12;

  ctx.save();
  if(dead){
    const fallAng=(1.1-u.deadTimer)*Math.PI*.55*-1;
    ctx.translate(x,GY);ctx.rotate(fallAng);ctx.translate(-x,-GY);
    ctx.globalAlpha=Math.max(0,u.deadTimer*.85);
  }

  // Shadow
  ctx.beginPath();ctx.ellipse(x,GY,u.sz*.9,u.sz*.22,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.28)';ctx.fill();

  // Back leg
  limb(x+LW*.5,hipY,-LW,LL*.52,legSw*.8,PANTS);
  limb(x+LW*.5+Math.sin(legSw*.8)*LL*.52,hipY+Math.cos(legSw*.8)*LL*.52,-LW*.85,LL*.5,-legSw*.35,PANTS);
  // Boot back
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();safeRR(x+LW*.1,GY-LL*.12,LW*.7,LL*.12+2*s,1*s);ctx.fill();

  // Body (armor)
  ctx.fillStyle=ARMOR;
  ctx.beginPath();safeRR(x-BW*.48,shY,BW*.96,BH*.65,3*s);ctx.fill();
  ctx.fillStyle=ARMOR2;
  ctx.beginPath();safeRR(x-BW*.28,shY+2*s,BW*.56,BH*.35,2*s);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(x,shY+2*s);ctx.lineTo(x,shY+BH*.65);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-BW*.28,shY+BH*.22);ctx.lineTo(x+BW*.28,shY+BH*.22);ctx.stroke();
  ctx.fillStyle='#3a2010';
  ctx.beginPath();safeRR(x-BW*.5,hipY-BH*.28,BW*1.0,3*s,1*s);ctx.fill();
  // Cape for captain
  if(eType==='captain'){
    ctx.fillStyle='#8a1010';ctx.beginPath();
    ctx.moveTo(x-BW*.6,hipY-BH*.2);ctx.lineTo(x-BW*.6,hipY+LL*.3);
    ctx.lineTo(x-BW*.1,hipY+LL*.15);ctx.lineTo(x+BW*.1,hipY+LL*.15);
    ctx.lineTo(x+BW*.6,hipY+LL*.3);ctx.lineTo(x+BW*.6,hipY-BH*.2);
    ctx.closePath();ctx.fill();
  }
  ctx.fillStyle=PANTS;
  ctx.beginPath();safeRR(x-BW*.42,hipY-2*s,BW*.84,4*s,2*s);ctx.fill();

  // Back arm
  const bArmA=armSw+(atk?0.2:0);
  limb(x-BW*.35,shY+BH*.1,-AW,BH*.52,bArmA+.12,ARMOR);
  limb(x-BW*.35+Math.sin(bArmA+.12)*BH*.52,shY+BH*.1+Math.cos(bArmA+.12)*BH*.52,-AW*.8,BH*.42,bArmA*.5-.08,SKIN_PT);

  // Front leg
  limb(x-LW*.5,hipY,-LW,LL*.52,-legSw*.8,PANTS);
  limb(x-LW*.5+Math.sin(-legSw*.8)*LL*.52,hipY+Math.cos(-legSw*.8)*LL*.52,-LW*.85,LL*.5,legSw*.35,PANTS);
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();safeRR(x-LW*.8,GY-LL*.12,LW*.7,LL*.12+2*s,1*s);ctx.fill();

  // Head
  ctx.beginPath();ctx.arc(x,headY,HR,0,Math.PI*2);ctx.fillStyle=SKIN_PT;ctx.fill();
  if(eType==='captain'){
    ctx.fillStyle='rgba(80,50,30,.35)';
    ctx.beginPath();ctx.ellipse(x,headY+HR*.35,HR*.55,HR*.4,0,0,Math.PI*2);ctx.fill();
  }
  ctx.beginPath();ctx.arc(x-HR*.38,headY-HR*.12,HR*.2,0,Math.PI*2);ctx.fillStyle='#1a0a00';ctx.fill();
  ctx.beginPath();ctx.arc(x-HR*.3,headY-HR*.18,HR*.08,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();

  // Helmet
  const helmetCol=eType==='captain'?'#5a4030':eType==='musketeer'?'#3a3a4a':'#7a7a8a';
  const helmetCol2=eType==='captain'?'#7a5a40':eType==='musketeer'?'#5a5a6a':'#9a9aaa';
  ctx.fillStyle=helmetCol;
  ctx.beginPath();ctx.arc(x,headY,HR+1.5*s,Math.PI,0,false);ctx.closePath();ctx.fill();
  ctx.fillStyle=helmetCol2;
  ctx.beginPath();ctx.ellipse(x,headY+.5*s,HR*1.35,Math.max(0.1,3*s),0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=helmetCol;
  ctx.beginPath();safeRR(x-1.2*s,headY,2.4*s,6*s,1*s);ctx.fill();
  if(eType==='captain'){
    ctx.fillStyle='#cc1010';
    for(let p=0;p<5;p++){
      const pa=Math.PI*.5+p*.12-.3;
      ctx.beginPath();ctx.ellipse(x+Math.cos(pa)*2*s,headY-HR-p*2*s,2*s,6*s,pa,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.fillStyle='rgba(255,255,255,.18)';
  ctx.beginPath();ctx.ellipse(x-HR*.3,headY-HR*.5,HR*.35,HR*.22,-.5,0,Math.PI*2);ctx.fill();

  // Weapon
  const fArmA=armSw+(atk?atkAngle:0.12);
  const fArmTopX=x+BW*.35,fArmTopY=shY+BH*.1;
  const elbX=fArmTopX+Math.sin(fArmA)*BH*.52;
  const elbY=fArmTopY+Math.cos(fArmA)*BH*.52;
  const handX=elbX+Math.sin(fArmA*.5-.08)*BH*.42;
  const handY=elbY+Math.cos(fArmA*.5-.08)*BH*.42;
  drawPortWeapon(handX,handY,eType,s,fArmA,atk);

  // Front arm
  limb(fArmTopX,fArmTopY,-AW,BH*.52,fArmA,ARMOR);
  limb(elbX,elbY,-AW*.8,BH*.42,fArmA*.5-.08,SKIN_PT);

  ctx.restore();
}

function drawPortWeapon(wx,wy,eType,s,ang,atk){
  ctx.save();ctx.translate(wx,wy);
  switch(eType){
    case 'soldier':case 'captain':
      ctx.rotate(ang+(atk?-.6:.1));
      ctx.fillStyle='#8a8a9a';
      ctx.beginPath();safeRR(-1.5*s,-18*s,3*s,18*s,1.5*s);ctx.fill();
      ctx.fillStyle='#c0c0d0';
      ctx.beginPath();safeRR(-1*s,-18*s,2*s,10*s,.8*s);ctx.fill();
      ctx.fillStyle='#8a6020';
      ctx.beginPath();safeRR(-4*s,-3*s,8*s,3*s,1*s);ctx.fill();
      if(eType==='captain'){
        ctx.fillStyle='#e0e0f0';
        ctx.beginPath();ctx.moveTo(0,-19*s);ctx.lineTo(-1.5*s,-14*s);ctx.lineTo(1.5*s,-14*s);ctx.closePath();ctx.fill();
      }
      break;
    case 'arquebusier':case 'musketeer':
      ctx.rotate(ang+.25);
      ctx.fillStyle='#4a2a08';
      ctx.beginPath();safeRR(-2*s,-26*s,4*s,26*s,2*s);ctx.fill();
      ctx.fillStyle='#8a8a9a';
      ctx.beginPath();safeRR(-1.8*s,-26*s,3.6*s,16*s,1.8*s);ctx.fill();
      ctx.fillStyle='#6a6a7a';
      ctx.beginPath();safeRR(-1.5*s,-26*s,3*s,5*s,1.5*s);ctx.fill();
      if(atk){
        const grd=ctx.createRadialGradient(0,-27*s,0,0,-27*s,7*s);
        grd.addColorStop(0,'rgba(255,220,50,.9)');grd.addColorStop(1,'rgba(255,100,0,0)');
        ctx.fillStyle=grd;ctx.beginPath();ctx.arc(0,-27*s,7*s,0,Math.PI*2);ctx.fill();
      }
      break;
  }
  ctx.restore();
}

// ════════════════════════════════════════════════════
// DRAW UNIT (dispatcher)
// ════════════════════════════════════════════════════
function drawUnit(u){
  if(u.state==='dead'&&u.deadTimer<=0) return;

  ctx.save();
  if(u.side==='enemy'){
    ctx.translate(u.x*2,0);ctx.scale(-1,1);
  }
  if(u.side==='player') drawIndigenous(u);
  else drawPortuguese(u);
  ctx.restore();

  if(u.atkFlash>0){
    ctx.beginPath();ctx.arc(u.x,u.y||GY-u.sz,u.sz+5,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,220,50,${u.atkFlash*.3})`;ctx.fill();
  }

  if(u.hp<u.maxHp){
    const bw=u.sz*2.8,bh=5,bx=u.x-bw/2,by=GY-u.sz*2-14;
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(bx,by,bw,bh);
    const pct=Math.max(0,u.hp/u.maxHp);
    ctx.fillStyle=pct>.6?'#4aaa30':pct>.3?'#e8a030':'#cc3333';
    ctx.fillRect(bx,by,bw*pct,bh);
    ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=.8;ctx.strokeRect(bx,by,bw,bh);
  }
}

// ════════════════════════════════════════════════════
// PROJECTILES
// ════════════════════════════════════════════════════
function drawProjectile(p){
  if(p.dead) return;
  ctx.save();
  const dx=p.tx-p.x,dy=p.ty-p.y,ang=Math.atan2(dy,dx);
  ctx.translate(p.x,p.y);ctx.rotate(ang);
  if(p.pType==='arrow'){
    ctx.fillStyle='#c8a040';ctx.fillRect(-10,-1.5,20,3);
    ctx.fillStyle='#8a6020';ctx.beginPath();ctx.moveTo(10,0);ctx.lineTo(4,-4);ctx.lineTo(4,4);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(200,160,60,.4)';ctx.fillRect(-14,-1,6,2);
  } else {
    ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fillStyle='rgba(255,200,80,.9)';ctx.fill();
    ctx.beginPath();ctx.arc(0,0,7,0,Math.PI*2);ctx.fillStyle='rgba(255,130,30,.2)';ctx.fill();
  }
  ctx.restore();
}

// ════════════════════════════════════════════════════
// PARTICLES
// ════════════════════════════════════════════════════
function addParts(x,y,col,n,type='hit'){
  for(let i=0;i<n;i++){
    if(G.parts.length>=MAX_PARTS) break;
    const a=Math.random()*Math.PI*2;
    const sp=type==='death'?(90+Math.random()*160):(40+Math.random()*100);
    G.parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-(type==='death'?80:20),
      life:type==='death'?.9+Math.random()*.5:.3+Math.random()*.3,
      mxL:type==='death'?1.4:.6,sz:type==='death'?4+Math.random()*4:2.5+Math.random()*2.5,col});
  }
}
function addFloat(x,y,txt,col='#e8c040',sz=14){
  G.floats.push({x,y,txt,col,sz,life:1.4});
}

function drawForestBG(){
  const t=G.time;
  const sk=ctx.createLinearGradient(0,0,0,CH);
  sk.addColorStop(0,'#0d1f0d');sk.addColorStop(.55,'#1a3a12');sk.addColorStop(1,'#2a5a1a');
  ctx.fillStyle=sk;ctx.fillRect(0,0,CW,CH);
  ctx.beginPath();ctx.arc(820,55,28,0,Math.PI*2);ctx.fillStyle='rgba(230,220,160,.18)';ctx.fill();
  for(let i=0;i<30;i++){const tx=(i*32+5)%CW,th=55+Math.sin(i*1.3)*20;drawTreeBG(tx,GY-35,th,'#0d2a0a','#081a06',.5);}
  for(let i=0;i<16;i++){const tx=(i*62+25)%CW,th=95+Math.sin(i*2.1)*28;drawTreeBG(tx,GY,th,'#163d10','#0e2a08',.9);}

  ctx.fillStyle=gr;ctx.fillRect(0,GY,CW,CH-GY);
  for(let i=0;i<14;i++){
    const fx=((i*97+Math.sin(t*.5+i)*45)%CW+CW)%CW;

    ctx.beginPath();ctx.arc(fx,fy,2,0,Math.PI*2);ctx.fillStyle=`rgba(200,240,100,${br*.55})`;ctx.fill();

}
function drawTreeBG(x,y,h,lc,tc,a=1){
  ctx.save();ctx.globalAlpha=a;
  ctx.fillStyle=tc;ctx.fillRect(x-4,y-h*.3,8,h*.32);
  ctx.fillStyle=lc;
  for(let l=0;l<3;l++){
    const ly=y-h*(.22+l*.27),lw=(h*.62)*(1-l*.18);
    ctx.beginPath();ctx.moveTo(x,ly-h*.3);ctx.lineTo(x-lw/2,ly);ctx.lineTo(x+lw/2,ly);ctx.closePath();ctx.fill();
  }
  ctx.restore();
}
function drawShipBG(){
  const t=G.time;
  const sk=ctx.createLinearGradient(0,0,0,CH*.62);
  sk.addColorStop(0,'#08101e');sk.addColorStop(1,'#1a3050');

    ctx.beginPath();ctx.arc(sx,sy,1,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,220,${(Math.sin(t*1.4+i)*.4+.6)*.8})`;ctx.fill();

  const oc=ctx.createLinearGradient(0,CH*.62,0,CH);
  oc.addColorStop(0,'#0a1e3a');oc.addColorStop(1,'#081828');

  for(let py=GY+15;py<CH;py+=18){ctx.beginPath();ctx.moveTo(0,py);ctx.lineTo(CW,py);ctx.stroke();}
  ctx.fillStyle='#5a3a18';ctx.fillRect(0,GY-18,CW,13);
  for(let rx=20;rx<CW;rx+=40){ctx.fillStyle='rgba(90,60,24,.9)';ctx.fillRect(rx-3,GY-36,6,20);}
  [CW*.28,CW*.72].forEach(mx=>{
    ctx.fillStyle='#5a3a18';ctx.fillRect(mx-4,85,8,GY-85);

    ctx.beginPath();ctx.moveTo(mx,88);ctx.lineTo(mx-78,165);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mx,88);ctx.lineTo(mx+78,165);ctx.stroke();
    ctx.fillStyle='rgba(200,190,160,.1)';ctx.beginPath();ctx.moveTo(mx,90);ctx.lineTo(mx-68,168);ctx.lineTo(mx+68,168);ctx.closePath();ctx.fill();

function drawVillageBG(){
  const t=G.time;
  const sk=ctx.createLinearGradient(0,0,0,CH);
  sk.addColorStop(0,'#1a0808');sk.addColorStop(.35,'#6a1a08');sk.addColorStop(.65,'#c05020');sk.addColorStop(1,'#e07030');

    const ex=((i*73+Math.sin(t*.4+i)*52)%CW+CW)%CW,ey=((i*37+Math.cos(t*.3+i)*32)%220+8);
    ctx.beginPath();ctx.arc(ex,ey,1.5,0,Math.PI*2);ctx.fillStyle=`rgba(255,160,50,${(Math.sin(t*3+i)*.4+.6)*.55})`;ctx.fill();

  const bldgs=[{x:80,w:55,h:105},{x:175,w:38,h:80},{x:240,w:75,h:125},{x:365,w:48,h:88},

  bldgs.forEach(b=>{
    ctx.fillStyle='rgba(18,8,4,.85)';

    for(let wi=0;wi<Math.floor(b.w/22);wi++){
      const br=Math.sin(t*1.5+wi+b.x*.01)*.3+.7;

    }
  });
  [100,300,500,700,900].forEach((tx2,i)=>{
    const flk=Math.sin(t*8+i)*.2+.8;
    ctx.fillStyle='#5a3a18';ctx.fillRect(tx2-3,GY-32,6,28);
    ctx.beginPath();ctx.arc(tx2,GY-38,8*flk,0,Math.PI*2);ctx.fillStyle=`rgba(255,120,20,${.65*flk})`;ctx.fill();
    ctx.beginPath();ctx.arc(tx2,GY-43,5*flk,0,Math.PI*2);ctx.fillStyle=`rgba(255,200,50,${.75*flk})`;ctx.fill();
  });

}

function drawBases(){
  // Player base (Maloca)
  ctx.save();
  if(G.pFlash>0){ctx.shadowColor=`rgba(255,100,100,${G.pFlash*.9})`;ctx.shadowBlur=22;}
  const px=P_BASE_X;
  ctx.fillStyle='#3a2008';ctx.fillRect(px-40,GY-105,80,105);
  ctx.fillStyle='#6a4a20';ctx.beginPath();ctx.moveTo(px-50,GY-105);ctx.lineTo(px,GY-162);ctx.lineTo(px+50,GY-105);ctx.closePath();ctx.fill();
  for(let i=0;i<6;i++){ctx.strokeStyle='#3a2a10';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(px-50+i*4.5,GY-105+i*7);ctx.lineTo(px+50-i*4.5,GY-105+i*7);ctx.stroke();}
  ctx.fillStyle='#18080a';ctx.beginPath();safeRR(px-11,GY-50,22,50,4);ctx.fill();
  ctx.fillStyle='rgba(255,140,40,.32)';ctx.fillRect(px-33,GY-82,13,15);ctx.fillRect(px+20,GY-82,13,15);
  [FEATH_COLS[0],FEATH_COLS[1],FEATH_COLS[2]].forEach((c,i)=>{feather(px-8+i*8,GY-163,18,Math.PI*(.15+i*.2)-(Math.PI/2),c);});
  ctx.restore();
  drawBaseBar(px-43,GY-180,86,G.pHP,true);

  // Enemy base (Fort)
  ctx.save();
  if(G.eFlash>0){ctx.shadowColor=`rgba(255,100,100,${G.eFlash*.9})`;ctx.shadowBlur=22;}
  const ex=E_BASE_X;
  ctx.fillStyle='#6a6a7a';ctx.fillRect(ex-44,GY-122,88,122);
  ctx.strokeStyle='rgba(0,0,0,.22)';ctx.lineWidth=1;
  for(let sr=0;sr<6;sr++)for(let sc=0;sc<3;sc++){const off=(sr%2)*14;ctx.strokeRect(ex-44+sc*29+off,GY-122+sr*20,27,18);}
  ctx.fillStyle='#5a5a6a';
  for(let bi=-2;bi<=2;bi++){ctx.fillRect(ex+bi*17-6,GY-140,12,21);}
  ctx.fillStyle='#1a1a2a';ctx.fillRect(ex-22,GY-92,6,20);ctx.fillRect(ex+16,GY-92,6,20);ctx.fillRect(ex-4,GY-76,8,22);
  ctx.fillStyle='#4a4a7a';ctx.fillRect(ex-1,GY-175,3,44);
  ctx.fillStyle='#6a6aaa';ctx.beginPath();ctx.moveTo(ex+2,GY-173);ctx.lineTo(ex+25,GY-164);ctx.lineTo(ex+2,GY-155);ctx.closePath();ctx.fill();
  ctx.fillStyle='#1a1a2a';ctx.beginPath();safeRR(ex-50,GY-50,20,10,3);ctx.fill();
  ctx.beginPath();ctx.arc(ex-47,GY-45,9,0,Math.PI*2);ctx.fillStyle='#0a0a1a';ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.ellipse(ex-14,GY-110,10,6,-.4,0,Math.PI*2);ctx.fill();
  ctx.restore();
  drawBaseBar(ex-43,GY-188,86,G.eHP,false);
}

function drawBaseBar(x,y,w,hp,isP){
  const pct=Math.max(0,hp/MAX_HP);
  const col=pct>.6?'#4aaa30':pct>.3?'#e8a030':'#cc3333';
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.beginPath();safeRR(x,y,w,9,4);ctx.fill();
  ctx.fillStyle=col;ctx.beginPath();safeRR(x,y,w*pct,9,4);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=1;ctx.beginPath();safeRR(x,y,w,9,4);ctx.stroke();
  ctx.fillStyle=pct>.3?'rgba(255,255,255,.75)':'rgba(255,200,200,.85)';
  ctx.font='bold 7px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(Math.max(0,Math.floor(hp)),x+w/2,y+4.5);
}

// ════════════════════════════════════════════════════
// DEPLOY ZONE
// ════════════════════════════════════════════════════
function drawDeployZone(){
  if(mouseX<80||mouseX>DEPLOY_MAX_X||mouseY<0||mouseY>CH) return;
  ctx.fillStyle='rgba(74,170,64,.07)';ctx.fillRect(80,0,DEPLOY_MAX_X-80,CH);
  const def=UDEFS[G.sel];
  if(def&&G.gold>=def.cost){
    ctx.globalAlpha=.42;
    ctx.save();
    const gu={x:mouseX,state:'walk',bobPhase:G.time*8,sz:def.sz,hp:1,maxHp:2,
      atkFlash:0,unitType:G.sel,side:'player',eType:null};
    drawIndigenous(gu);
    ctx.restore();
    ctx.globalAlpha=1;
  }
  ctx.strokeStyle='rgba(74,170,64,.22)';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
  ctx.strokeRect(80,2,DEPLOY_MAX_X-82,CH-4);ctx.setLineDash([]);
}

function drawFloatTexts(){
  G.floats=G.floats.filter(f=>{
    f.y-=28/60;f.life-=1/60;
    if(f.life<=0) return false;
    ctx.globalAlpha=Math.min(1,f.life*2.5);
    ctx.font=`bold ${f.sz}px 'Cinzel',serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=f.col;ctx.fillText(f.txt,f.x,f.y);
    ctx.globalAlpha=1;
    return true;
  });
}

// ════════════════════════════════════════════════════
// SPAWNING
// ════════════════════════════════════════════════════
function spawnUnit(def,defKey,side,px,py){
  const u={...def,id:G.uid++,x:side==='player'?px:E_BASE_X-65+Math.random()*25,
    y:GY-def.sz,state:'walk',side,hp:def.hp,maxHp:def.hp,
    atkTimer:Math.random()*def.rate,deadTimer:1.1,
    bobPhase:Math.random()*Math.PI*2,atkFlash:0,
    unitType:defKey,eType:def.eType||null};
  G.units.push(u);return u;
}
function placePlayerUnit(cx){
  const def=UDEFS[G.sel];
  if(!def||G.gold<def.cost||cx<P_BASE_X+65||cx>DEPLOY_MAX_X) return;
  G.gold-=def.cost;spawnUnit(def,G.sel,'player',cx,0);
  addParts(cx,GY-def.sz,'#4aaa30',7,'hit');updateHUD();
}
function startWave(){
  const wi=Math.min(G.wave,WAVES.length-1);
  const wv=WAVES[wi];G.wave++;G.spawning=true;
  let delay=0;
  wv.forEach(({t,n})=>{for(let i=0;i<n;i++){G.spawnQ.push({t,delay,spawned:false});delay+=.55;}});
  addFloat(CW/2,100,`⚔️ ONDA ${G.wave}!`,'#cc3333',22);
  G.gold+=30;updateHUD();
}

// ════════════════════════════════════════════════════
// UNIT AI
// ════════════════════════════════════════════════════
function findTarget(u){
  const enemies=G.units.filter(e=>e.side!==u.side&&e.state!=='dead');
  if(!enemies.length) return null;
  return enemies.reduce((n,e)=>Math.abs(e.x-u.x)<Math.abs(n.x-u.x)?e:n,enemies[0]);
}
function allyBlock(u){
  return G.units.some(a=>a!==u&&a.side===u.side&&a.state!=='dead'
    &&Math.abs(a.x-u.x)<u.sz*2.1
    &&(u.side==='player'?a.x>u.x&&a.x<u.x+u.sz*2.2:a.x<u.x&&a.x>u.x-u.sz*2.2));
}
function killUnit(u,ks){
  u.state='dead';u.deadTimer=1.1;
  addParts(u.x,GY-u.sz*1.2,u.side==='player'?'#b07030':'#6a7a8a',14,'death');
  if(ks==='player'){G.kills++;G.gold+=20;addFloat(u.x,GY-u.sz*2.5,'+20 🪙','#e8c040',13);updateHUD();}
}
function updateUnit(u,dt){
  if(u.state==='dead'){u.deadTimer-=dt;return;}
  u.bobPhase=(u.bobPhase||0)+dt*9;
  if(u.atkFlash>0)u.atkFlash=Math.max(0,u.atkFlash-dt*4);
  if(u.type==='support'){
    const wnd=G.units.filter(a=>a!==u&&a.side==='player'&&a.state!=='dead'&&a.hp<a.maxHp);
    const tgt=wnd.sort((a,b)=>a.hp/a.maxHp-b.hp/b.maxHp)[0]||null;
    if(tgt&&Math.abs(tgt.x-u.x)<u.rng){
      u.state='attack';u.atkTimer-=dt;
      if(u.atkTimer<=0){u.atkTimer=u.rate;
        G.units.filter(a=>a.side==='player'&&a.state!=='dead'&&Math.abs(a.x-u.x)<u.rng)
          .forEach(a=>{a.hp=Math.min(a.maxHp,a.hp+22);addParts(a.x,GY-a.sz,'#4aff80',5,'hit');addFloat(a.x,GY-a.sz*2.5,'+22','#4aff80',11);});
      }
    } else if(tgt){u.x+=Math.sign(tgt.x-u.x)*u.spd*dt;u.state='walk';}
    else{if(!allyBlock(u))u.x+=u.spd*.4*dt;u.state='walk';}
    return;
  }
  const tgt=findTarget(u);
  const baseX=u.side==='player'?E_BASE_X:P_BASE_X;
  if(!tgt){
    const toBase=baseX-u.x;
    if(Math.abs(toBase)>u.sz+8){u.x+=Math.sign(toBase)*u.spd*dt;u.state='walk';}
    else{
      u.state='attack';u.atkTimer-=dt;
      if(u.atkTimer<=0){u.atkTimer=u.rate;u.atkFlash=1;
        if(u.side==='player'){G.eHP-=u.dmg;G.eFlash=.35;addParts(E_BASE_X-44,GY-80,'#cc3333',5,'hit');}
        else{G.pHP-=u.dmg;G.pFlash=.35;addParts(P_BASE_X+44,GY-80,'#cc3333',5,'hit');}
      }
    }
    return;
  }
  const d=Math.abs(tgt.x-u.x);
  if(d>u.rng){
    if(!allyBlock(u)||u.type==='ranged')u.x+=Math.sign(tgt.x-u.x)*u.spd*dt;
    u.state='walk';
  } else {
    u.state='attack';u.atkTimer-=dt;
    if(u.atkTimer<=0){u.atkTimer=u.rate;u.atkFlash=1;
      if(u.type==='ranged'){
        G.proj.push({id:G.pid++,x:u.x,y:GY-u.sz,tx:tgt.x,ty:GY-tgt.sz,target:tgt,
          dmg:u.dmg,side:u.side,spd:460,dead:false,pType:'arrow'});
      } else {
        tgt.hp-=u.dmg;addParts(tgt.x,GY-tgt.sz,'#ff9030',6,'hit');
        if(tgt.hp<=0&&tgt.state!=='dead')killUnit(tgt,u.side);
      }
    }
  }
}
function updateProj(p,dt){
  if(p.dead) return;
  if(!p.target||p.target.state==='dead'){p.dead=true;return;}
  p.tx=p.target.x;p.ty=GY-p.target.sz;
  const dx=p.tx-p.x,dy=p.ty-p.y,d=Math.hypot(dx,dy);
  if(d<12){
    p.target.hp-=p.dmg;addParts(p.target.x,GY-p.target.sz,'#ff9030',6,'hit');
    if(p.target.hp<=0&&p.target.state!=='dead')killUnit(p.target,p.side);
    p.dead=true;
  } else {
    const s=p.spd*dt/d;p.x+=dx*s;p.y+=dy*s;
  }
}

// ════════════════════════════════════════════════════
// GAME LOOP
// ════════════════════════════════════════════════════
function update(dt){
  G.time+=dt;
  G.goldT+=dt;if(G.goldT>=.45){G.gold+=2;G.goldT-=.45;updateHUD();}
  if(!G.spawning&&G.spawnQ.length===0){G.waveTimer-=dt;if(G.waveTimer<=0){startWave();G.waveTimer=18;}}
  G.spawnQ.forEach(s=>{s.delay-=dt;});
  G.spawnQ.filter(s=>s.delay<=0&&!s.spawned).forEach(s=>{s.spawned=true;spawnUnit(EDEFS[s.t],s.t,'enemy',0,0);});
  if(G.spawnQ.every(s=>s.spawned)){G.spawnQ=[];G.spawning=false;}
  G.units.forEach(u=>updateUnit(u,dt));
  G.units=G.units.filter(u=>!(u.state==='dead'&&u.deadTimer<=0));
  G.proj.forEach(p=>updateProj(p,dt));
  G.proj=G.proj.filter(p=>!p.dead);
  G.parts.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=285*dt;p.life-=dt;p.sz*=.97;});
  G.parts=G.parts.filter(p=>p.life>0);
  if(G.pFlash>0)G.pFlash-=dt*3;if(G.eFlash>0)G.eFlash-=dt*3;
  if(Math.floor(G.time*10)%4===0)updateHUD();
  if(G.eHP<=0){G.running=false;G.screen='win';renderEndScreen(true);}
  else if(G.pHP<=0){G.running=false;G.screen='lose';renderEndScreen(false);}
}

function renderFrame(){
  ctx.clearRect(0,0,CW,CH);
  if(G.map==='forest')drawForestBG();
  else if(G.map==='ship')drawShipBG();
  else drawVillageBG();
  if(G.screen==='game')drawDeployZone();
  [...G.units].sort((a,b)=>a.x-b.x).forEach(drawUnit);
  G.proj.forEach(drawProjectile);
  G.parts.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life/p.mxL);ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.5,p.sz),0,Math.PI*2);ctx.fillStyle=p.col;ctx.fill();ctx.globalAlpha=1;});
  drawBases();
  drawFloatTexts();
  ctx.strokeStyle='rgba(74,170,64,.15)';ctx.lineWidth=1.2;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(DEPLOY_MAX_X,0);ctx.lineTo(DEPLOY_MAX_X,CH);ctx.stroke();ctx.setLineDash([]);
  if(G.pFlash>0){ctx.fillStyle=`rgba(255,50,50,${G.pFlash*.28})`;ctx.fillRect(0,0,CW*.12,CH);}
  if(G.eFlash>0){ctx.fillStyle=`rgba(255,50,50,${G.eFlash*.28})`;ctx.fillRect(CW*.88,0,CW*.12,CH);}
}

function gameLoop(ts){
  const dt=Math.min((ts-(lastTs||ts))/1000,.05);lastTs=ts;
  update(dt);
  if(G.screen==='game'){renderFrame();raf=requestAnimationFrame(gameLoop);}
}

// ════════════════════════════════════════════════════
// HUD
// ════════════════════════════════════════════════════
function updateHUD(){
  const gv=document.getElementById('gv');if(gv)gv.textContent=Math.floor(G.gold);
  const wl=document.getElementById('wl');if(wl)wl.textContent=`ONDA ${G.wave}`;
  const wt=document.getElementById('wt');
  if(wt){const s=Math.ceil(Math.max(0,G.waveTimer));
    if(G.spawning){wt.textContent='⚔️ ONDA EM CURSO';wt.className='wave-timer urgent';}
    else if(s<=5){wt.textContent=`ONDA EM ${s}s!`;wt.className='wave-timer urgent';}
    else{wt.textContent=`Próxima: ${s}s`;wt.className='wave-timer';}}
  const ppct=Math.max(0,G.pHP/MAX_HP),epct=Math.max(0,G.eHP/MAX_HP);
  const pf=document.getElementById('phf');if(pf)pf.style.width=`${ppct*100}%`;
  const ef=document.getElementById('ehf');if(ef)ef.style.width=`${epct*100}%`;
  const pv=document.getElementById('phv');if(pv)pv.textContent=Math.max(0,Math.floor(G.pHP));
  const ev=document.getElementById('ehv');if(ev)ev.textContent=Math.max(0,Math.floor(G.eHP));
  Object.keys(UDEFS).forEach(k=>{
    const b=document.getElementById(`ub-${k}`);
    if(b){b.className='ubtn'+(G.gold<UDEFS[k].cost?' disabled':'')+(G.sel===k?' selected':'');}
  });
}
function unitPanelHTML(){
  return Object.entries(UDEFS).map(([k,d])=>`
    <div class="ubtn${G.sel===k?' selected':''}" id="ub-${k}" onclick="selUnit('${k}')">
      <div class="ubtn-emoji">${d.em}</div>
      <div class="ubtn-name">${d.nm}</div>
      <div class="ubtn-cost">🪙 ${d.cost}</div>
      <div class="ubtn-hp">❤ ${d.hp}</div>
    </div>`).join('');
}

// ════════════════════════════════════════════════════
// SCREENS
// ════════════════════════════════════════════════════
function genEmbers(n,col){return Array.from({length:n},()=>{const x=Math.random()*100,d=4+Math.random()*8,del=-Math.random()*12,sz=2+Math.random()*5;return`<div class="t-ember" style="left:${x}%;animation-duration:${d}s;animation-delay:${del}s;width:${sz}px;height:${sz}px;background:radial-gradient(circle,${col},transparent)"></div>`;}).join('')}

function renderMapSelect(){
  document.getElementById('app').innerHTML=`
  <div class="map-select">
    ${genEmbers(20,'#e8a030')}${genEmbers(8,'#4aaa40')}
    <div style="position:relative;z-index:1;width:100%;text-align:center">
      <div class="ms-eye">⬥ Escolha o Campo de Batalha ⬥</div>
      <h1 class="ms-title">Guerreiros da Floresta</h1>
      <p class="ms-sub">Battle Simulator · Clash Royale Style</p>
      <div class="ms-div"></div>
      <div class="map-cards">
        ${Object.entries(MAPS).map(([k,m])=>`
        <div class="map-card" onclick="startGame('${k}')">
          <div class="map-card-thumb" style="background:${m.sky}">
            <span style="filter:drop-shadow(0 0 12px rgba(255,255,255,.3))">${m.icon}</span>
            <div class="map-card-badge">${m.badge}</div>
          </div>
          <div class="map-card-body">
            <div class="map-card-name">${m.nm}</div>
            <div class="map-card-desc">${m.desc}</div>
          </div>
        </div>`).join('')}
      </div>
      <div style="animation:fadeIn .8s 1s both">
        <p style="font-size:.78rem;color:var(--dim);font-style:italic;margin-bottom:14px;line-height:1.9">
          Clique no lado <strong style="color:var(--grn)">esquerdo</strong> do campo para posicionar suas tropas.<br>
          Destrua a <strong style="color:var(--red)">fortaleza inimiga</strong> antes que destruam a sua!
        </p>
        <div style="display:flex;gap:18px;justify-content:center;flex-wrap:wrap;font-size:.74rem;color:var(--dim)">
          ${Object.entries(UDEFS).map(([,d])=>`<span>${d.em} ${d.nm} 🪙${d.cost}</span>`).join('')}
        </div>
      </div>
    </div>
    <div class="t-trees">🌳🌲🌿🌳🌲🌿🌳🌲🌿🌳🌲🌿🌳🌲🌿🌳🌲🌿</div>
  </div>`;
}

function startGame(map){
  initState(map);
  document.getElementById('app').innerHTML=`
  <div class="game-wrap">
    <div class="hud-bar">
      <div class="hud-base">
        <span class="base-icon">🏚️</span>
        <div class="base-hp-wrap">
          <div class="base-hp-track"><div id="phf" class="base-hp-fill p-fill" style="width:100%"></div></div>
          <span id="phv" class="base-hp-val">${MAX_HP}</span>
        </div>
      </div>
      <div class="hud-center">
        <div id="wl" class="wave-lbl">ONDA 0</div>
        <div id="wt" class="wave-timer">Inicia em: 10s</div>
        <div class="gold-disp">🪙 <span id="gv">150</span></div>
      </div>
      <div class="hud-base right">
        <div class="base-hp-wrap" style="text-align:right">
          <div class="base-hp-track"><div id="ehf" class="base-hp-fill e-fill" style="width:100%"></div></div>
          <span id="ehv" class="base-hp-val">${MAX_HP}</span>
        </div>
        <span class="base-icon">🏰</span>
      </div>
    </div>
    <div class="canvas-wrap">
      <canvas id="gc" width="${CW}" height="${CH}"></canvas>
    </div>
    <div class="unit-panel">${unitPanelHTML()}</div>
  </div>`;
  canvas=document.getElementById('gc');ctx=canvas.getContext('2d');
  canvas.addEventListener('click',e=>{
    const r=canvas.getBoundingClientRect();
    placePlayerUnit((e.clientX-r.left)*(CW/r.width));
  });
  canvas.addEventListener('mousemove',e=>{
    const r=canvas.getBoundingClientRect();
    mouseX=(e.clientX-r.left)*(CW/r.width);mouseY=(e.clientY-r.top)*(CH/r.height);
  });
  canvas.addEventListener('mouseleave',()=>{mouseX=-9;mouseY=-9;});
  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    const r=canvas.getBoundingClientRect(),t=e.touches[0];
    placePlayerUnit((t.clientX-r.left)*(CW/r.width));
  },{passive:false});
  G.floats=[];updateHUD();lastTs=0;
  raf=requestAnimationFrame(gameLoop);
}

function renderEndScreen(won){
  const dur=Math.floor(G.time),min=Math.floor(dur/60),sec=dur%60;
  document.getElementById('app').innerHTML=`
  <div class="end-wrap" style="background:radial-gradient(ellipse at 50% 30%,rgba(${won?'38,89,33':'80,20,20'},.42),var(--bg) 65%)">
    ${genEmbers(22,won?'#4aaa40':'#cc3333')}${won?genEmbers(8,'#e8c040'):''}
    <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center">
      <div style="font-size:4rem;margin-bottom:12px;filter:drop-shadow(0 0 26px rgba(${won?'74,170,64':'204,51,51'},.55));animation:pulse 2s infinite">${won?'🌳':'🔥'}</div>
      <h1 class="${won?'vic':'def'}-title">${won?'A Floresta Venceu!':'A Aldeia Caiu!'}</h1>
      <p class="end-sub" style="color:var(--text)">${won?
        'Com bravura e estratégia, os guerreiros destruíram a fortaleza portuguesa. A floresta permanece livre!':
        'Os portugueses derrubaram nossas defesas. Mas a floresta não esquece. Tente novamente!'}</p>
      <div class="end-stats">
        <div class="estat"><div class="ei">⚔️</div><div class="el">Inimigos</div><div class="ev" style="color:var(--grn)">${G.kills}</div></div>
        <div class="estat"><div class="ei">🌊</div><div class="el">Ondas</div><div class="ev" style="color:var(--gold)">${G.wave}</div></div>
        <div class="estat"><div class="ei">⏱️</div><div class="el">Duração</div><div class="ev" style="color:var(--dim)">${min}:${sec<10?'0'+sec:sec}</div></div>
      </div>
      <div class="flex-row">
        <button class="btn-primary" onclick="renderMapSelect()">🗺️ OUTRO MAPA</button>
        <button class="btn-primary" style="background:linear-gradient(135deg,#6a1a0a,#4a0808);border-color:var(--red)" onclick="startGame('${G.map}')">🔄 JOGAR NOVAMENTE</button>
      </div>
    </div>
  </div>`;
}

function selUnit(k){G.sel=k;updateHUD();}
renderMapSelect();
</script>
